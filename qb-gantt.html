function renderTicks(host, w) {
  const z = ZOOM_LEVELS[State.zoom];
  const total = totalDays();
  const start = State.chartStart;

  // Major ticks
  let cursor = start;
  while (cursor <= State.chartEnd) {
    let next, label;
    if (z.majorUnit === "week") {
      next = startOfWeek(addDays(cursor, 7));
      label = `Week of ${cursor.getMonth()+1}/${cursor.getDate()}`;
    } else if (z.majorUnit === "month") {
      next = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
      label = cursor.toLocaleString("default", { month: "long", year: "numeric" });
    } else if (z.majorUnit === "quarter") {
      next = new Date(cursor.getFullYear(), startOfQuarter(cursor).getMonth()+3, 1);
      label = `Q${Math.floor(cursor.getMonth()/3)+1} ${cursor.getFullYear()}`;
    } else {
      next = new Date(cursor.getFullYear()+1, 0, 1);
      label = String(cursor.getFullYear());
    }
    const x = dateToX(cursor);
    const xn = dateToX(next);
    const tick = el("div", {
      class: "tick-major",
      style: { left: x + "px", width: (xn - x) + "px" },
    }, [label]);
    host.appendChild(tick);
    cursor = next;
  }

  // Minor ticks
  cursor = start;
  while (cursor <= State.chartEnd) {
    let next, label;
    if (z.minorUnit === "day") {
      next = addDays(cursor, 1);
      label = String(cursor.getDate());
    } else if (z.minorUnit === "week") {
      next = startOfWeek(addDays(cursor, 7));
      label = `${cursor.getMonth()+1}/${cursor.getDate()}`;
    } else if (z.minorUnit === "month") {
      next = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
      label = cursor.toLocaleString("default", { month: "short" });
    } else {
      next = new Date(cursor.getFullYear(), startOfQuarter(cursor).getMonth()+3, 1);
      label = `Q${Math.floor(cursor.getMonth()/3)+1}`;
    }
    const x = dateToX(cursor);
    const xn = dateToX(next);
    if ((xn - x) >= 18) {
      host.appendChild(el("div", {
        class: "tick-minor",
        style: { left: x + "px", width: (xn - x) + "px" },
      }, [label]));
    }
    cursor = next;
  }
}

function renderTodayLine(host) {
  const today = new Date(); today.setHours(0,0,0,0);
  if (today < State.chartStart || today > State.chartEnd) return;
  const x = dateToX(today);
  host.appendChild(el("div", { class: "today-line", style: { left: x + "px" }}));
}

function renderRows(host, w) {
  if (!State.visible.length) {
    host.appendChild(el("div", { class: "empty" }, ["No tasks visible"]));
    return;
  }

  // Weekend shading (day/week zoom)
  if (State.zoom === "day" || State.zoom === "week") {
    let cursor = startOfWeek(State.chartStart);
    while (cursor <= State.chartEnd) {
      if (State.zoom === "day") {
        const sat = addDays(cursor, 6);
        const x1 = dateToX(sat);
        const x2 = x1 + 2 * State.ppd;
        host.appendChild(el("div", {
          class: "row-grid weekend",
          style: { left: x1 + "px", width: (x2 - x1) + "px" },
        }));
      }
      cursor = addDays(cursor, 7);
    }
  }

  // Holiday shading
  if (State.cfg.holidays && State.zoom === "day") {
    const holidays = parseHolidays(State.cfg.holidays);
    let cursor = new Date(State.chartStart);
    while (cursor <= State.chartEnd) {
      if (isHoliday(cursor) && !isWeekend(cursor)) {
        const x = dateToX(cursor);
        host.appendChild(el("div", {
          class: "row-grid holiday",
          style: { left: x + "px", width: State.ppd + "px" },
        }));
      }
      cursor = addDays(cursor, 1);
    }
  }

  // Compute critical path tasks (driving the latest finish)
  const criticalRids = computeCriticalPath();

  // Rows stack in natural document flow inside timeline-inner.
  State.visible.forEach((item, idx) => {
    if (item.type === "group") {
      const row = el("div", {
        class: "tl-row group-header",
        style: { width: w + "px" },
      });
      host.appendChild(row);
      return;
    }
    const t = item.task;
    const sel = State.selectedRid === t.rid ? " selected" : "";
    const row = el("div", {
      class: "tl-row" + sel,
      style: { width: w + "px" },
      "data-rid": t.rid,
    });

    // Baseline ghost bar
    if (State.showBaselines && t.baselineStart && t.baselineEnd) {
      const bx = dateToX(t.baselineStart);
      const bw = Math.max(2, dateToX(addDays(t.baselineEnd, 1)) - bx);
      row.appendChild(el("div", {
        class: "baseline-bar",
        style: { left: bx + "px", width: bw + "px" },
      }));
    }

    // Main bar
    const today = new Date(); today.setHours(0,0,0,0);
    const isLate = t.end < today && t.percent < 100;
    const statusClass = (() => {
      if (t.percent >= 100) return "complete";
      if (isLate) return "late";
      const s = (t.status || "").toLowerCase().trim();
      if (!s || s === "not started" || s.includes("not start") || s.includes("pending") || s === "planning") return "not-started";
      if (s.includes("complete") || s.includes("done") || s === "closed") return "complete";
      if (s.includes("block") || s.includes("hold") || s.includes("cancel")) return "blocked";
      if (s.includes("progress") || s.includes("active") || s.includes("ongoing")) return "in-progress";
      return "not-started";
    })();

    const x = dateToX(t.start);
    const barWidth = Math.max(t.isMilestone ? 24 : 4,
      dateToX(addDays(t.end, 1)) - x);

    const critClass = criticalRids.has(t.rid) ? " critical" : "";
    const isSummary = t.isParent && State.cfg.fidParentTask;

    const bar = el("div", {
      class: "bar " + statusClass + (t.isMilestone ? " milestone" : "") + (isSummary ? " summary" : "") + critClass,
      style: { left: x + "px", width: barWidth + "px" },
      title: `${t.name}\n${fmtUS(t.start)} \u2192 ${fmtUS(t.end)}\n${t.status} | ${t.percent}%`,
      "data-rid": t.rid,
      onclick: e => { e.stopPropagation(); selectTask(t.rid); },
      ondblclick: () => openQuickEdit(t.rid),
      oncontextmenu: e => showContextMenu(e, t),
    });

    // Percent fill
    if (t.percent > 0 && t.percent < 100 && !t.isMilestone && !isSummary) {
      const pctFill = el("div", {
        class: "pct-fill",
        style: { width: t.percent + "%" },
      });
      bar.appendChild(pctFill);

      // Progress drag handle
      if (State.cfg.fidPercent && !State.cfg.readOnly) {
        const pctHandle = el("div", {
          class: "pct-handle",
          style: { left: t.percent + "%" },
        });
        attachProgressDrag(pctHandle, bar, t);
        bar.appendChild(pctHandle);
      }
    }

    // Label (conditional on showLabels)
    if (!t.isMilestone && !isSummary && State.showLabels) {
      bar.appendChild(el("div", { class: "lbl" }, [t.name]));
    }

    // Resize handles (not on summary or milestone, not in read-only)
    if (State.cfg.allowResize && !t.isMilestone && !isSummary && !State.cfg.readOnly) {
      bar.appendChild(el("div", { class: "handle left", "data-handle": "left" }));
      bar.appendChild(el("div", { class: "handle right", "data-handle": "right" }));
    }

    // Dependency connector circle (for drag-to-create deps)
    if (State.cfg.depDbid && !State.cfg.readOnly && !isSummary) {
      const conn = el("div", { class: "connector", title: "Drag to create dependency" });
      attachDepDraw(conn, t);
      bar.appendChild(conn);
    }

    row.appendChild(bar);

    // Drag enabled for non-summary, non-read-only
    if (State.cfg.allowDrag && !isSummary && !State.cfg.readOnly) {
      attachBarDrag(bar, t);
    }

    host.appendChild(row);
  });

  // Padding to allow scrolling
  host.style.minHeight = (State.visible.length * DEFAULTS.rowHeight + 40) + "px";
}

/* ============================================================
   PROGRESS DRAG
   ============================================================ */
function attachProgressDrag(handle, bar, task) {
  handle.addEventListener("pointerdown", e => {
    e.stopPropagation();
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    const barRect = bar.getBoundingClientRect();
    const barW = barRect.width;

    const onMove = ev => {
      const localX = ev.clientX - barRect.left;
      const pct = Math.max(0, Math.min(100, Math.round((localX / barW) * 100)));
      handle.style.left = pct + "%";
      const fill = bar.querySelector(".pct-fill");
      if (fill) fill.style.width = pct + "%";
    };
    const onUp = ev => {
      handle.removeEventListener("pointermove", onMove);
      handle.removeEventListener("pointerup", onUp);
      const localX = ev.clientX - barRect.left;
      const pct = Math.max(0, Math.min(100, Math.round((localX / barW) * 100)));
      const oldPct = task.percent;
      task.percent = pct;

      const { cfg } = State;
      if (!cfg.autoSave) {
        queueChange(task.rid, cfg.fidPercent, oldPct, pct);
        pushUndo({
          type: "percent", desc: `Progress ${task.name} to ${pct}%`,
          undo() { task.percent = oldPct; },
          redo() { task.percent = pct; },
        });
        toast(`${task.name}: ${pct}%`, "info");
      } else {
        pushUndo({
          type: "percent", desc: `Progress ${task.name} to ${pct}%`,
          undo() { task.percent = oldPct; },
          redo() { task.percent = pct; },
        });
        updateRecords(cfg.taskDbid, [{ [3]: { value: task.rid }, [cfg.fidPercent]: { value: pct } }], [3])
          .then(() => toast(`${task.name}: ${pct}%`, "success"))
          .catch(err => toast("Save failed: " + err.message, "error"));
      }
      render();
    };
    handle.addEventListener("pointermove", onMove);
    handle.addEventListener("pointerup", onUp);
  });
}

/* ============================================================
   DEPENDENCY DRAWING
   ============================================================ */
function attachDepDraw(connector, predTask) {
  connector.addEventListener("pointerdown", e => {
    e.stopPropagation();
    e.preventDefault();
    connector.setPointerCapture(e.pointerId);

    const inner = document.getElementById("timeline-inner");
    const scroll = document.getElementById("timeline-scroll");
    if (!inner || !scroll) return;
    const ns = "http://www.w3.org/2000/svg";

    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("class", "dep-svg");
    svg.style.width = inner.style.width;
    svg.style.height = inner.style.minHeight || "100%";
    svg.setAttribute("width", parseInt(inner.style.width) || 2000);
    svg.setAttribute("height", parseInt(inner.style.minHeight) || 2000);
    svg.style.pointerEvents = "none";

    const line = document.createElementNS(ns, "line");
    line.setAttribute("class", "dep-draw-line");
    const rect = connector.getBoundingClientRect();
    const scrollRect = scroll.getBoundingClientRect();
    const startX = rect.right - scrollRect.left + scroll.scrollLeft;
    const startY = rect.top + rect.height / 2 - scrollRect.top + scroll.scrollTop;
    line.setAttribute("x1", startX);
    line.setAttribute("y1", startY);
    line.setAttribute("x2", startX);
    line.setAttribute("y2", startY);
    svg.appendChild(line);
    inner.appendChild(svg);

    const onMove = ev => {
      const mx = ev.clientX - scrollRect.left + scroll.scrollLeft;
      const my = ev.clientY - scrollRect.top + scroll.scrollTop;
      line.setAttribute("x2", mx);
      line.setAttribute("y2", my);
    };
    const onUp = ev => {
      connector.removeEventListener("pointermove", onMove);
      connector.removeEventListener("pointerup", onUp);
      svg.remove();
      // Find target bar
      const target = document.elementFromPoint(ev.clientX, ev.clientY);
      const targetBar = target ? target.closest(".bar[data-rid]") : null;
      if (targetBar) {
        const succRid = Number(targetBar.dataset.rid);
        if (succRid && succRid !== predTask.rid) {
          createDependency(predTask.rid, succRid, "FS", 0);
        }
      }
    };
    connector.addEventListener("pointermove", onMove);
    connector.addEventListener("pointerup", onUp);
  });
}

async function createDependency(predRid, succRid, type, lag) {
  const { cfg } = State;
  if (!cfg.depDbid) return;

  // Check if dependency already exists
  const exists = State.dependencies.some(d => d.pred === predRid && d.succ === succRid);
  if (exists) { toast("Dependency already exists", "error"); return; }

  const row = {
    [cfg.fidDepPred]: { value: predRid },
    [cfg.fidDepSucc]: { value: succRid },
  };
  if (cfg.fidDepType) row[cfg.fidDepType] = { value: type };
  if (cfg.fidDepLag) row[cfg.fidDepLag] = { value: lag };
  if (cfg.fidDepProject && cfg.projectRid) row[cfg.fidDepProject] = { value: Number(cfg.projectRid) };

  try {
    const result = await qbFetch("/records", {
      method: "POST",
      body: JSON.stringify({ to: cfg.depDbid, data: [row] }),
    }, cfg.depDbid);
    const newRid = result.metadata ? result.metadata.createdRecordIds?.[0] : 0;
    State.dependencies.push({ rid: newRid, pred: predRid, succ: succRid, type, lag });
    pushUndo({
      type: "dep", desc: "Create dependency",
      undo() { State.dependencies = State.dependencies.filter(d => d.rid !== newRid); },
      redo() { State.dependencies.push({ rid: newRid, pred: predRid, succ: succRid, type, lag }); },
    });
    toast("Dependency created", "success");
    render();
    // Refresh quick edit panel if open for either task
    if (State.selectedRid === predRid || State.selectedRid === succRid) openQuickEdit(State.selectedRid);
  } catch (err) {
    toast("Failed to create dependency: " + err.message, "error");
  }
}

async function deleteDependency(depRid) {
  const { cfg } = State;
  if (!cfg.depDbid || !depRid) return;
  const dep = State.dependencies.find(d => d.rid === depRid);
  if (!dep) return;
  try {
    await qbFetch("/records", {
      method: "DELETE",
      body: JSON.stringify({ from: cfg.depDbid, where: `{3.EX.${depRid}}` }),
    }, cfg.depDbid);
    State.dependencies = State.dependencies.filter(d => d.rid !== depRid);
    pushUndo({
      type: "dep", desc: "Delete dependency",
      undo() { State.dependencies.push(dep); },
      redo() { State.dependencies = State.dependencies.filter(d => d.rid !== depRid); },
    });
    toast("Dependency removed", "success");
    render();
    if (State.selectedRid) openQuickEdit(State.selectedRid);
  } catch (err) {
    toast("Failed to delete dependency: " + err.message, "error");
  }
}

/* ============================================================
   CREATE / DELETE TASKS
   ============================================================ */
async function deleteTask(rid) {
  if (!rid) return;
  const { cfg } = State;
  const t = State.tasks.find(x => x.rid === rid);
  if (!t) return;
  if (!confirm("Delete task \"" + t.name + "\"? This cannot be undone in Quickbase.")) return;
  try {
    setStatus("Deleting...", "info");
    await qbFetch("/records", {
      method: "DELETE",
      body: JSON.stringify({ from: cfg.taskDbid, where: `{3.EX.${rid}}` }),
    }, cfg.taskDbid);
    // Also delete any dependencies referencing this task
    const relatedDeps = State.dependencies.filter(d => d.pred === rid || d.succ === rid);
    for (const dep of relatedDeps) {
      try {
        await qbFetch("/records", {
          method: "DELETE",
          body: JSON.stringify({ from: cfg.depDbid, where: `{3.EX.${dep.rid}}` }),
        }, cfg.depDbid);
      } catch { /* best effort */ }
    }
    const savedTask = { ...t, raw: { ...t.raw } };
    const savedDeps = [...relatedDeps];
    State.tasks = State.tasks.filter(x => x.rid !== rid);
    State.dependencies = State.dependencies.filter(d => d.pred !== rid && d.succ !== rid);
    pushUndo({
      type: "task", desc: "Delete task: " + savedTask.name,
      undo() {
        State.tasks.push(savedTask);
        savedDeps.forEach(d => State.dependencies.push(d));
      },
      redo() {
        State.tasks = State.tasks.filter(x => x.rid !== rid);
        State.dependencies = State.dependencies.filter(d => d.pred !== rid && d.succ !== rid);
      },
    });
    closeQuickEdit();
    computeChartWindow();
    applyFilters();
    toast("Task deleted", "success");
  } catch (err) {
    toast("Delete failed: " + err.message, "error");
  }
}

async function createTask() {
  const { cfg } = State;
  if (cfg.readOnly || !cfg.taskDbid) return;
  const name = prompt("New task name:");
  if (!name || !name.trim()) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const endDate = addWorkingDays(today, 5);
  const row = {};
  if (cfg.fidName) row[cfg.fidName] = { value: name.trim() };
  const startSaveFid = cfg.fidStartSave || cfg.fidStart;
  if (startSaveFid) row[startSaveFid] = { value: fmtISO(today) };
  if (cfg.fidEnd) row[cfg.fidEnd] = { value: fmtISO(endDate) };
  if (cfg.fidStatus) row[cfg.fidStatus] = { value: "Not Started" };
  if (cfg.fidProject && cfg.projectRid) row[cfg.fidProject] = { value: Number(cfg.projectRid) };
  try {
    setStatus("Creating task...", "info");
    const result = await qbFetch("/records", {
      method: "POST",
      body: JSON.stringify({ to: cfg.taskDbid, data: [row] }),
    }, cfg.taskDbid);
    const newRid = result.metadata ? result.metadata.createdRecordIds?.[0] : 0;
    if (!newRid) { toast("Task created but no record ID returned", "error"); return; }
    const newTask = {
      rid: newRid,
      name: name.trim(),
      status: "Not Started",
      percent: 0,
      group: "",
      assigned: "",
      priority: "",
      start: today,
      end: endDate,
      isMilestone: false,
      baselineStart: null,
      baselineEnd: null,
      parentRid: 0,
      sortOrder: 0,
      wbs: "",
      duration: 5,
      depth: 0,
      isParent: false,
      raw: {},
    };
    State.tasks.push(newTask);
    pushUndo({
      type: "task", desc: "Create task: " + name.trim(),
      undo() { State.tasks = State.tasks.filter(x => x.rid !== newRid); },
      redo() { State.tasks.push(newTask); },
    });
    computeChartWindow();
    applyFilters();
    toast("Task created", "success");
    openQuickEdit(newRid);
  } catch (err) {
    toast("Create failed: " + err.message, "error");
  }
}

/* ============================================================
   CONTEXT MENU
   ============================================================ */
function dismissContextMenu() {
  const old = document.querySelector(".ctx-menu");
  if (old) old.remove();
}

function showContextMenu(e, task) {
  e.preventDefault();
  e.stopPropagation();
  dismissContextMenu();

  const menu = el("div", { class: "ctx-menu" });
  menu.appendChild(el("button", { class: "ctx-item", onclick: () => { dismissContextMenu(); openQuickEdit(task.rid); }}, ["Edit"]));

  if (!State.cfg.readOnly) {
    menu.appendChild(el("div", { class: "ctx-sep" }));
    menu.appendChild(el("button", { class: "ctx-item", onclick: () => { dismissContextMenu(); createTask(); }}, ["New Task"]));
    menu.appendChild(el("div", { class: "ctx-sep" }));
    menu.appendChild(el("button", { class: "ctx-item danger", onclick: () => { dismissContextMenu(); deleteTask(task.rid); }}, ["Delete Task"]));
  }

  // Position, clamped to viewport
  let x = e.clientX, y = e.clientY;
  menu.style.left = x + "px";
  menu.style.top = y + "px";
  document.body.appendChild(menu);
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 4) + "px";
  if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 4) + "px";

  const dismiss = (ev) => {
    if (!menu.contains(ev.target)) { dismissContextMenu(); document.removeEventListener("pointerdown", dismiss, true); }
  };
  setTimeout(() => document.addEventListener("pointerdown", dismiss, true), 0);
}

/* ============================================================
   DEPENDENCIES
   ============================================================ */
function renderDependencies(host, w) {
  if (!State.showDeps || !State.dependencies.length) return;
  // Build rid -> row index map
  const rowIdx = {};
  State.visible.forEach((item, idx) => {
    if (item.type === "task") rowIdx[item.task.rid] = idx;
  });
  const rh = DEFAULTS.rowHeight;
  const totalH = State.visible.length * rh;

  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("class", "dep-svg");
  svg.setAttribute("width", w);
  svg.setAttribute("height", totalH);
  svg.style.width = w + "px";
  svg.style.height = totalH + "px";

  // Arrowhead
  const defs = document.createElementNS(ns, "defs");
  const marker = document.createElementNS(ns, "marker");
  marker.setAttribute("id", "arrow");
  marker.setAttribute("viewBox", "0 0 10 10");
  marker.setAttribute("refX", "8");
  marker.setAttribute("refY", "5");
  marker.setAttribute("markerWidth", "6");
  marker.setAttribute("markerHeight", "6");
  marker.setAttribute("orient", "auto-start-reverse");
  const path = document.createElementNS(ns, "path");
  path.setAttribute("d", "M 0 0 L 10 5 L 0 10 z");
  path.setAttribute("fill", "#94a3b8");
  marker.appendChild(path);
  defs.appendChild(marker);
  svg.appendChild(defs);

  State.dependencies.forEach(dep => {
    const pred = State.tasks.find(t => t.rid === dep.pred);
    const succ = State.tasks.find(t => t.rid === dep.succ);
    if (!pred || !succ) return;
    const pi = rowIdx[pred.rid], si = rowIdx[succ.rid];
    if (pi == null || si == null) return;

    const y1 = pi * rh + rh/2;
    const y2 = si * rh + rh/2;
    const type = (dep.type || "FS").toUpperCase();

    // Connection points per type
    let x1, x2;
    if (type === "SS") {
      x1 = dateToX(pred.start);
      x2 = dateToX(succ.start);
    } else if (type === "FF") {
      x1 = dateToX(addDays(pred.end, 1));
      x2 = dateToX(addDays(succ.end, 1));
    } else if (type === "SF") {
      x1 = dateToX(pred.start);
      x2 = dateToX(addDays(succ.end, 1));
    } else {
      // FS (default)
      x1 = dateToX(addDays(pred.end, 1));
      x2 = dateToX(succ.start);
    }

    const violated = checkDepViolation(dep, pred, succ);
    const midX = Math.max(x1 + 8, Math.min(x2 - 8, (x1 + x2) / 2));
    const pe = document.createElementNS(ns, "path");
    pe.setAttribute("class", "dep-line" + (violated ? " violation" : ""));
    pe.setAttribute("d", `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`);
    pe.setAttribute("marker-end", "url(#arrow)");
    svg.appendChild(pe);
  });

  host.appendChild(svg);
}

function checkDepViolation(dep, pred, succ) {
  const type = (dep.type || "FS").toUpperCase();
  const lag = dep.lag || 0;
  if (type === "FS") return succ.start < addDays(pred.end, 1 + lag);
  if (type === "SS") return succ.start < addDays(pred.start, lag);
  if (type === "FF") return succ.end < addDays(pred.end, lag);
  if (type === "SF") return succ.end < addDays(pred.start, lag);
  return false;
}

function computeCriticalPath() {
  // Lightweight: tasks whose end date equals the project max end and chain back through deps
  if (!State.tasks.length) return new Set();
  let maxEnd = State.tasks[0].end;
  for (const t of State.tasks) if (t.end > maxEnd) maxEnd = t.end;
  const critical = new Set();
  State.tasks.forEach(t => {
    if (fmtISO(t.end) === fmtISO(maxEnd)) critical.add(t.rid);
  });
  // Walk back through deps
  let changed = true;
  while (changed) {
    changed = false;
    State.dependencies.forEach(d => {
      if (critical.has(d.succ) && !critical.has(d.pred)) {
        critical.add(d.pred); changed = true;
      }
    });
  }
  return critical;
}

/* ============================================================
   DRAG / RESIZE
   ============================================================ */
function attachBarDrag(bar, task) {
  let mode = null;        // "move" | "resize-start" | "resize-end"
  let startX = 0, origLeft = 0, origWidth = 0;
  let dayShift = 0;
  let tooltip = null;     // floating drag tooltip element

  // Compute new dates from the current bar geometry. Returns {start, end}.
  // Reads pixel position back into a date so the tooltip always shows what
  // would be saved, no off-by-one between move/resize math.
  function currentDates() {
    const left = parseFloat(bar.style.left) || 0;
    const width = parseFloat(bar.style.width) || State.ppd;
    const startDays = Math.round(left / State.ppd);
    const endDays = Math.round((left + width) / State.ppd) - 1;
    const newStart = addDays(State.chartStart, startDays);
    const newEnd = addDays(State.chartStart, Math.max(startDays, endDays));
    return { newStart, newEnd };
  }

  function showTooltip(e) {
    if (!tooltip) {
      tooltip = document.createElement("div");
      tooltip.className = "drag-tooltip";
      document.body.appendChild(tooltip);
    }
    const { newStart, newEnd } = currentDates();
    const action = mode === "resize-start" ? "Start"
                 : mode === "resize-end"   ? "End"
                 : "Move";
    const sign = dayShift > 0 ? "+" : "";
    const wdInfo = State.cfg.skipWeekends
      ? ` (${diffWorkingDays(newStart, newEnd) + 1} work days)`
      : "";
    tooltip.innerHTML = `
      <div class="name">${escapeHtml(task.name)}</div>
      <div class="dates">${fmtUS(newStart)}<span class="arrow">\u2192</span>${fmtUS(newEnd)}</div>
      <div class="meta">${action} \u2022 ${sign}${dayShift} day${Math.abs(dayShift)===1?"":"s"}${wdInfo}</div>
    `;
    tooltip.style.left = (e.clientX + 16) + "px";
    tooltip.style.top  = (e.clientY + 16) + "px";
  }
  function hideTooltip() {
    if (tooltip) { tooltip.remove(); tooltip = null; }
  }

  let _dragging = false;

  bar.addEventListener("pointerdown", e => {
    const handle = e.target.closest(".handle");
    if (handle) {
      mode = handle.dataset.handle === "left" ? "resize-start" : "resize-end";
    } else {
      mode = "move";
    }
    startX = e.clientX;
    origLeft = parseFloat(bar.style.left) || 0;
    origWidth = parseFloat(bar.style.width) || 0;
    dayShift = 0;
    _dragging = false;
  });

  bar.addEventListener("pointermove", e => {
    if (!mode) return;
    // Only commit to drag after a few pixels of movement
    if (!_dragging) {
      if (Math.abs(e.clientX - startX) < 3) return;
      _dragging = true;
      bar.setPointerCapture(e.pointerId);
      bar.classList.add("dragging");
      showTooltip(e);
    }
    const dx = e.clientX - startX;
    dayShift = Math.round(dx / State.ppd);
    if (mode === "move") {
      bar.style.left = Math.max(0, origLeft + dayShift * State.ppd) + "px";
    } else if (mode === "resize-start") {
      const newLeft = Math.max(0, origLeft + dayShift * State.ppd);
      const delta = newLeft - origLeft;
      const newWidth = Math.max(State.ppd, origWidth - delta);
      bar.style.left = newLeft + "px";
      bar.style.width = newWidth + "px";
    } else if (mode === "resize-end") {
      const newWidth = Math.max(State.ppd, origWidth + dayShift * State.ppd);
      bar.style.width = newWidth + "px";
    }
    showTooltip(e);
  });

  bar.addEventListener("pointerup", async e => {
    if (!mode) return;
    bar.classList.remove("dragging");
    hideTooltip();
    const action = mode;
    mode = null;
    _dragging = false;
    if (dayShift === 0) return;
    try {
      if (action === "move") {
        await moveTask(task, dayShift);
      } else if (action === "resize-start") {
        await resizeTaskStart(task, dayShift);
      } else if (action === "resize-end") {
        await resizeTaskEnd(task, dayShift);
      }
    } catch (err) {
      console.error(err);
      toast("Save failed: " + err.message, "error");
      render();
    }
  });

  bar.addEventListener("pointercancel", () => {
    mode = null;
    bar.classList.remove("dragging");
    hideTooltip();
    render();
  });
}

async function moveTask(task, dayShift) {
  const newStart = addDays(task.start, dayShift);
  const newEnd = addDays(task.end, dayShift);
  await saveTaskDates(task, newStart, newEnd);

  if (State.cascadeOnMove && State.dependencies.length) {
    const cascaded = await cascadeForward(task, dayShift);
    if (cascaded > 0) toast(`Cascaded shift to ${cascaded} successor${cascaded===1?"":"s"}`, "success");
  }
}

async function resizeTaskStart(task, dayShift) {
  const newStart = addDays(task.start, dayShift);
  if (newStart >= task.end) {
    toast("Start must be before end", "error");
    return render();
  }
  await saveTaskDates(task, newStart, task.end);
}

async function resizeTaskEnd(task, dayShift) {
  const newEnd = addDays(task.end, dayShift);
  if (newEnd <= task.start) {
    toast("End must be after start", "error");
    return render();
  }
  await saveTaskDates(task, task.start, newEnd);
}

async function saveTaskDates(task, newStart, newEnd) {
  const { cfg } = State;
  if (cfg.readOnly) { toast("Read-only mode", "error"); render(); return; }

  const oldStart = new Date(task.start);
  const oldEnd = new Date(task.end);
  const startSaveFid = cfg.fidStartSave || cfg.fidStart;
  const row = {
    [3]: { value: task.rid },
    [startSaveFid]: { value: fmtISO(newStart) },
  };
  if (cfg.fidEnd) row[cfg.fidEnd] = { value: fmtISO(newEnd) };

  // Manual save mode: queue instead of calling API
  if (!cfg.autoSave) {
    task.start = newStart;
    task.end = newEnd;
    queueChange(task.rid, startSaveFid, fmtISO(oldStart), fmtISO(newStart));
    if (cfg.fidEnd) queueChange(task.rid, cfg.fidEnd, fmtISO(oldEnd), fmtISO(newEnd));
    pushUndo({
      type: "dates", desc: `Move ${task.name}`,
      undo() { task.start = oldStart; task.end = oldEnd; },
      redo() { task.start = newStart; task.end = newEnd; },
    });
    computeChartWindow();
    applyFilters();
    toast(`Queued ${task.name}`, "info");
    return;
  }

  setStatus(`Saving ${task.name}...`, "info");

  try {
    await updateRecords(
      cfg.taskDbid,
      [row],
      [3, cfg.fidStart, cfg.fidEnd, cfg.fidStartSave].filter(x => x)
    );

    pushUndo({
      type: "dates", desc: `Move ${task.name}`,
      undo() { task.start = oldStart; task.end = oldEnd; },
      redo() { task.start = newStart; task.end = newEnd; },
    });

    task.start = newStart;
    task.end = newEnd;
    computeChartWindow();
    applyFilters();

    setStatus(`Saved ${task.name}`, "ok");
    toast(`Saved ${task.name}`, "success");
  } catch (err) {
    console.error("Save failed:", err);
    toast("Save failed: " + err.message, "error");
    setStatus("Save failed", "err");
    render();
    throw err;
  }
}

async function cascadeForward(rootTask, dayShift) {
  let count = 0;
  const visited = new Set();
  async function walk(rid) {
    if (visited.has(rid)) return;
    visited.add(rid);
    const successors = State.dependencies.filter(d => d.pred === rid).map(d => d.succ);
    for (const sRid of successors) {
      const succ = State.tasks.find(t => t.rid === sRid);
      if (!succ) continue;
      const newStart = addDays(succ.start, dayShift);
      const newEnd = addDays(succ.end, dayShift);
      await saveTaskDates(succ, newStart, newEnd);
      count++;
      await walk(sRid);
    }
  }
  await walk(rootTask.rid);
  return count;
}

/* ============================================================
   UNDO / REDO
   ============================================================ */
function pushUndo(entry) {
  State.undoStack.push(entry);
  if (State.undoStack.length > 50) State.undoStack.shift();
  State.redoStack = [];
}

function undo() {
  const entry = State.undoStack.pop();
  if (!entry) return;
  entry.undo();
  State.redoStack.push(entry);
  computeChartWindow();
  applyFilters();
  toast("Undo: " + entry.desc);
}

function redo() {
  const entry = State.redoStack.pop();
  if (!entry) return;
  entry.redo();
  State.undoStack.push(entry);
  computeChartWindow();
  applyFilters();
  toast("Redo: " + entry.desc);
}

/* ============================================================
   MANUAL SAVE (PENDING CHANGES)
   ============================================================ */
function queueChange(rid, fid, oldVal, newVal) {
  const key = `${rid}_${fid}`;
  const existing = State.pendingChanges.find(c => `${c.rid}_${c.fid}` === key);
  if (existing) {
    existing.newVal = newVal;
  } else {
    State.pendingChanges.push({ rid, fid, oldVal, newVal });
  }
}

async function saveAllPending() {
  if (!State.pendingChanges.length) return;
  const { cfg } = State;
  const byRid = {};
  State.pendingChanges.forEach(c => {
    if (!byRid[c.rid]) byRid[c.rid] = { [3]: { value: c.rid } };
    byRid[c.rid][c.fid] = { value: c.newVal };
  });
  try {
    setStatus("Saving all pending changes...", "info");
    await updateRecords(cfg.taskDbid, Object.values(byRid), [3]);
    const count = State.pendingChanges.length;
    State.pendingChanges = [];
    toast(`Saved ${count} change${count === 1 ? "" : "s"}`, "success");
    setStatus("All changes saved", "ok");
    render();
  } catch (err) {
    toast("Batch save failed: " + err.message, "error");
    setStatus("Save failed", "err");
  }
}

function discardAllPending() {
  if (!State.pendingChanges.length) return;
  State.pendingChanges = [];
  State.undoStack = [];
  State.redoStack = [];
  loadTasks().catch(showError);
}

/* ============================================================
   SAVE FIELD VALUE (single-field save helper)
   ============================================================ */
async function saveFieldValue(task, fid, value, fieldLabel) {
  const { cfg } = State;
  if (cfg.readOnly) { toast("Read-only mode", "error"); return; }
  if (!fid) return;

  const oldVal = task.raw[fid] ? task.raw[fid].value : "";
  const row = { [3]: { value: task.rid }, [fid]: { value } };

  if (!cfg.autoSave) {
    queueChange(task.rid, fid, oldVal, value);
    pushUndo({
      type: "field", desc: `Edit ${fieldLabel} on ${task.name}`,
      undo() { if (task.raw[fid]) task.raw[fid].value = oldVal; },
      redo() { if (task.raw[fid]) task.raw[fid].value = value; },
    });
    toast(`Queued ${fieldLabel}`, "info");
    return;
  }

  try {
    await updateRecords(cfg.taskDbid, [row], [3]);
    pushUndo({
      type: "field", desc: `Edit ${fieldLabel} on ${task.name}`,
      undo() { if (task.raw[fid]) task.raw[fid].value = oldVal; },
      redo() { if (task.raw[fid]) task.raw[fid].value = value; },
    });
    toast(`Saved ${fieldLabel}`, "success");
  } catch (err) {
    toast("Save failed: " + err.message, "error");
  }
}

/* ============================================================
   ACTIONS
   ============================================================ */
function setZoom(z) {
  State.zoom = z;
  if (z === "all") {
    // Auto-fit: divide viewport width by total days to fill exactly
    const scroll = document.getElementById("timeline-scroll");
    const vw = scroll ? scroll.clientWidth : 1000;
    const days = Math.max(totalDays(), 1);
    State.ppd = Math.max(0.5, vw / days);
  } else {
    State.ppd = ZOOM_LEVELS[z].ppd;
  }
  render();
}
function fitToTasks() {
  computeChartWindow();
  // pick zoom that fits viewport
  const scroll = document.getElementById("timeline-scroll");
  if (scroll) {
    const vw = scroll.clientWidth || 800;
    const days = totalDays();
    const idealPpd = vw / days;
    let best = "quarter";
    if (idealPpd >= 30) best = "day";
    else if (idealPpd >= 15) best = "week";
    else if (idealPpd >= 6) best = "month";
    setZoom(best);
  } else {
    render();
  }
}
function scrollToToday() {
  const scroll = document.getElementById("timeline-scroll");
  if (!scroll) return;
  const today = new Date(); today.setHours(0,0,0,0);
  if (today < State.chartStart || today > State.chartEnd) {
    State.chartStart = addDays(today, -30);
    State.chartEnd = addDays(today, 90);
    render();
  }
  const x = dateToX(today);
  scroll.scrollLeft = Math.max(0, x - scroll.clientWidth/3);
  State._scrollLeft = scroll.scrollLeft;
}
function selectTask(rid) {
  State.selectedRid = rid;
  render();
}
function toggleGroup(key) {
  State.groups[key] = !State.groups[key];
  computeVisible();
  render();
}

function shiftWindow(dir) {
  const scroll = document.getElementById("timeline-scroll");
  if (!scroll) return;
  const shiftMap = { day: 7, week: 30, month: 90, quarter: 180, all: 90 };
  const days = (shiftMap[State.zoom] || 30) * dir;
  scroll.scrollLeft += days * State.ppd;
  State._scrollLeft = scroll.scrollLeft;
}

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCSV() {
  const headers = ["Record ID","Name","Start","End","Status","% Complete","Assigned","Group"];
  const rows = State.filtered.map(t => [
    t.rid,
    `"${(t.name || "").replace(/"/g, '""')}"`,
    fmtISO(t.start),
    fmtISO(t.end),
    `"${(t.status || "").replace(/"/g, '""')}"`,
    t.percent,
    `"${(t.assigned || "").replace(/"/g, '""')}"`,
    `"${(t.group || "").replace(/"/g, '""')}"`,
  ]);
  const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gantt-export-${fmtISO(new Date())}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast("CSV exported", "success");
}

function exportXLS() {
  const esc = s => String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  const headers = ["Record ID","Name","Start","End","Status","% Complete","Assigned","Group"];
  let rows = "";
  // Header row
  rows += "<Row>" + headers.map(h => `<Cell><Data ss:Type="String">${esc(h)}</Data></Cell>`).join("") + "</Row>\n";
  // Data rows
  State.filtered.forEach(t => {
    rows += "<Row>";
    rows += `<Cell><Data ss:Type="Number">${t.rid}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${esc(t.name)}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${fmtISO(t.start)}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${fmtISO(t.end)}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${esc(t.status)}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="Number">${t.percent}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${esc(t.assigned)}</Data></Cell>`;
    rows += `<Cell><Data ss:Type="String">${esc(t.group)}</Data></Cell>`;
    rows += "</Row>\n";
  });
  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Worksheet ss:Name="Gantt Export">
<Table>${rows}</Table>
</Worksheet>
</Workbook>`;
  const blob = new Blob([xml], { type: "application/vnd.ms-excel" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `gantt-export-${fmtISO(new Date())}.xls`;
  a.click();
  URL.revokeObjectURL(url);
  toast("Excel exported", "success");
}

/* ============================================================
   SETTINGS PERSISTENCE (localStorage)
   ============================================================ */
function getSettingsKey() {
  const { cfg } = State;
  return `qb-gantt-${cfg.taskDbid}-${cfg.projectRid || "all"}`;
}

function loadPersistedSettings() {
  try {
    const key = getSettingsKey();
    const raw = localStorage.getItem(key);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.zoom && ZOOM_LEVELS[s.zoom]) { State.zoom = s.zoom; State.ppd = ZOOM_LEVELS[s.zoom].ppd; }
    if (s.groupBy) State.groupBy = s.groupBy;
    if (s.showBaselines !== undefined) State.showBaselines = s.showBaselines;
    if (s.showDeps !== undefined) State.showDeps = s.showDeps;
    if (s.showLabels !== undefined) State.showLabels = s.showLabels;
    if (s.collapsedTasks) State.collapsedTasks = s.collapsedTasks;
    if (Array.isArray(s.columnOrder) && s.columnOrder.length === 4) State.columnOrder = s.columnOrder;
    if (s.mobileView) State.mobileView = s.mobileView;
  } catch { /* ignore */ }
}

function persistSettings() {
  try {
    const key = getSettingsKey();
    localStorage.setItem(key, JSON.stringify({
      zoom: State.zoom,
      groupBy: State.groupBy,
      showBaselines: State.showBaselines,
      showDeps: State.showDeps,
      showLabels: State.showLabels,
      collapsedTasks: State.collapsedTasks,
      columnOrder: State.columnOrder,
      mobileView: State.mobileView,
    }));
  } catch { /* ignore */ }
}

function renderField(label, type, value, onChange, options = []) {
  const wrap = el("div", { class: "fld" }, [
    el("label", {}, [label]),
  ]);
  let input;
  if (type === "select") {
    input = el("select");
    input.appendChild(el("option", { value: "" }, [""]));
    options.forEach(o => {
      const op = el("option", { value: o }, [o]);
      if (o === value) op.selected = true;
      input.appendChild(op);
    });
  } else if (type === "textarea") {
    input = el("textarea", { rows: "3" });
    input.value = value || "";
  } else {
    input = el("input", { type, value: value || "" });
  }
  input.addEventListener("change", e => onChange(e.target.value));
  input.addEventListener("input", e => onChange(e.target.value));
  wrap.appendChild(input);
  return wrap;
}

function closeQuickEdit() {
  const sp = document.getElementById("side-panel");

  State.selectedRid = null;
  document.body.style.overflow = "";

async function saveQuickEdit(task) {
  const { cfg } = State;
  const startSaveFid = cfg.fidStartSave || cfg.fidStart;
  const data = { [3]: { value: task.rid } };
  if (task._editName !== undefined && cfg.fidName) data[cfg.fidName] = { value: task._editName };
  if (task._editStart !== undefined) {
    data[startSaveFid] = { value: task._editStart };
  }
  if (task._editEnd !== undefined && cfg.fidEnd) data[cfg.fidEnd] = { value: task._editEnd };
  if (task._editStatus !== undefined && cfg.fidStatus) data[cfg.fidStatus] = { value: task._editStatus };
  if (task._editPercent !== undefined && cfg.fidPercent) data[cfg.fidPercent] = { value: Number(task._editPercent) };
  if (task._editAssigned !== undefined && cfg.fidAssigned) data[cfg.fidAssigned] = { value: task._editAssigned };
  if (task._editGroup !== undefined && cfg.fidGroup) data[cfg.fidGroup] = { value: task._editGroup };
  try {
    setStatus("Saving...", "info");
    await updateRecords(cfg.taskDbid, [data], [3]);
    // Optimistic local update — same pattern as drag/resize save
    if (task._editName !== undefined) task.name = task._editName;
    if (task._editStart !== undefined) task.start = parseDate(task._editStart) || task.start;
    if (task._editEnd !== undefined) task.end = parseDate(task._editEnd) || task.end;
    if (task._editStatus !== undefined) task.status = task._editStatus;
    if (task._editPercent !== undefined) task.percent = Number(task._editPercent);
    if (task._editAssigned !== undefined) task.assigned = task._editAssigned;
    if (task._editGroup !== undefined) task.group = task._editGroup;
    closeQuickEdit();
    computeChartWindow();
    applyFilters();
    toast("Saved", "success");
  } catch (err) {
    toast("Save failed: " + err.message, "error");
  }
}

/* ============================================================
   VALIDATION
   ============================================================ */
function validateSchedule() {
  const issues = [];
  const today = new Date(); today.setHours(0,0,0,0);

  State.tasks.forEach(t => {
    if (!t.start) issues.push({ rid: t.rid, sev: "error", msg: `${t.name} is missing a start date`, name: t.name });
    if (!t.end) issues.push({ rid: t.rid, sev: "error", msg: `${t.name} is missing an end date`, name: t.name });
    if (t.start && t.end && t.end < t.start) issues.push({ rid: t.rid, sev: "error", msg: `${t.name} ends before it starts`, name: t.name });
    if (t.start && t.end && t.end < today && t.percent < 100) issues.push({ rid: t.rid, sev: "warning", msg: `${t.name} is past due (${t.percent}% complete)`, name: t.name });
    if (t.baselineStart && t.start) {
      const drift = diffDays(t.baselineStart, t.start);
      if (Math.abs(drift) > 14) issues.push({ rid: t.rid, sev: "info", msg: `${t.name} drifted ${drift>0?"+":""}${drift} days from baseline`, name: t.name });
    }
  });

  State.dependencies.forEach(d => {
    const p = State.tasks.find(t => t.rid === d.pred);
    const s = State.tasks.find(t => t.rid === d.succ);
    if (!p || !s) return;
    if (checkDepViolation(d, p, s)) {
      const type = (d.type || "FS").toUpperCase();
      issues.push({ rid: s.rid, sev: "error", msg: `${s.name}: ${type} dependency on ${p.name} violated (+${d.lag||0} lag)`, name: s.name });
    }
  });

  showValidationPanel(issues);
}

function showValidationPanel(issues) {
  const sp = document.getElementById("side-panel");
  sp.innerHTML = "";
  sp.appendChild(el("div", { class: "ph" }, [
    el("h3", {}, [`Schedule Validation`]),
    el("button", { class: "btn ghost", onclick: closeQuickEdit }, ["✕"]),
  ]));
  const body = el("div", { class: "pb", style: { padding: 0 }});
  if (!issues.length) {
    body.appendChild(el("div", { class: "empty" }, [
      el("div", { class: "ico" }, ["✓"]),
      el("div", {}, ["No issues found."]),
    ]));
  } else {
    const ul = el("ul", { class: "validation-list" });
    issues.forEach(i => {
      ul.appendChild(el("li", {
        class: i.sev,
        onclick: () => { selectTask(i.rid); scrollToTask(i.rid); }
      }, [
        el("div", { class: "sev" }),
        el("div", {}, [
          el("div", {}, [i.msg]),
          el("div", { class: "meta" }, [`Record #${i.rid}`]),
        ]),
      ]));
    });
    body.appendChild(ul);
  }
  sp.appendChild(body);
  sp.classList.add("open");
}

function scrollToTask(rid) {
  const t = State.tasks.find(x => x.rid === rid);
  if (!t) return;
  const scroll = document.getElementById("timeline-scroll");
  if (scroll) {
    scroll.scrollLeft = Math.max(0, dateToX(t.start) - scroll.clientWidth/3);
    State._scrollLeft = scroll.scrollLeft;
  }
}

function autoMap(fields) {
  // Returns guessed mapping
  const byType = {};
  fields.forEach(f => {
    const t = f.fieldType || "";
    if (!byType[t]) byType[t] = [];
    byType[t].push(f);
  });

  const dateFields = (byType["date"] || []).concat(byType["timestamp"] || []);
  const textFields = (byType["text"] || []).concat(byType["text-multi-line"] || [], byType["text-multiple-choice"] || []);
  const numericFields = (byType["numeric"] || []).concat(byType["percent"] || [], byType["currency"] || []);
  const checkboxFields = byType["checkbox"] || [];
  const refFields = (fields).filter(f => /reference|recordid lookup|lookup/i.test(f.fieldType || "") || /Project.*Record ID/i.test(f.label || ""));

  const guess = {
    fidName: pickFirst(fields, [/^name$/i, /phase\s*name/i, /task\s*name/i, /title/i, /^summary/i]) || pickFirst(textFields, [/.*/]),
    fidStart: pickFirst(dateFields, [/^start$/i, /start.*date/i, /begin/i]),
    fidEnd: pickFirst(dateFields, [/^end$/i, /end.*date/i, /finish/i, /due/i, /target/i]),
    fidStartSave: pickFirst(dateFields, [/start.*date.*manual/i, /manual.*start/i, /editable.*start/i]),
    fidStatus: pickFirst(fields, [/^status$/i, /state/i, /phase\s*status/i]),
    fidPercent: pickFirst(numericFields, [/percent.*complete/i, /%.*complete/i, /progress/i]),
    fidAssigned: pickFirst(fields, [/assigned.*to/i, /owner/i, /^assignee/i]),
    fidGroup: pickFirst(fields, [/^phase$/i, /^group$/i, /work\s*stream/i, /category/i]),
    fidMilestone: pickFirst(checkboxFields, [/milestone/i]),
    fidPriority: pickFirst(fields, [/^priority$/i, /^rank$/i]),
    fidProject: pickFirst(fields, [/project.*record\s*id/i, /related\s*project/i, /^project$/i, /project.*id/i]),
    fidBaselineStart: pickFirst(dateFields, [/baseline.*start/i, /planned.*start/i, /original.*start/i]),
    fidBaselineEnd: pickFirst(dateFields, [/baseline.*end/i, /planned.*end/i, /original.*end/i, /baseline.*finish/i]),
    fidParentTask: pickFirst(fields, [/parent.*task/i, /parent.*rid/i, /parent.*record/i]),
    fidSortOrder: pickFirst(numericFields, [/sort.*order/i, /^order$/i, /sequence/i]),
    fidWbs: pickFirst(textFields, [/^wbs$/i, /wbs.*code/i]),
    fidDuration: pickFirst(numericFields, [/^duration$/i, /duration.*days/i]),
  };
  // remove zeros
  Object.keys(guess).forEach(k => { if (!guess[k]) delete guess[k]; });
  return guess;
}

function pickFirst(fields, patterns) {
  for (const pat of patterns) {
    for (const f of fields) {
      if (pat.test(f.label || "")) return f.id;
    }
  }
  return 0;
}

  pair("Realm", Wiz.realm);
  pair("Task DBID", Wiz.taskDbid);
  pair("Code page ID", Wiz.pageId || "(set after saving)");
  pair("Mapped fields", Object.keys(m).filter(k => m[k]).length);
  if (Wiz.depDbid) pair("Dep DBID", Wiz.depDbid);

  const card1 = el("div", { class: "card" }, [
    el("h2", {}, ["Configuration summary"]),
    summary,
  ]);

  const card2 = el("div", { class: "card" }, [
    el("h2", {}, ["Project table button formula"]),
    el("p", { class: "desc" }, [
      "Add a Formula URL field to your Project table named 'Open Gantt'. Paste this. Add the field to the form."
    ]),
    el("div", { class: "code-block" }, [
      el("button", { class: "copy", onclick: e => copyToClipboard(buttonFormula, e.target) }, ["Copy"]),
      buttonFormula,
    ]),
  ]);

  const card3 = el("div", { class: "card" }, [
    el("h2", {}, ["Direct test URL"]),
    el("p", { class: "desc" }, [
      "Replace [YOUR_APP_DBID] and [PROJECT_RID] to test without the button. Or click below to launch with the current settings."
    ]),
    el("div", { class: "code-block" }, [
      el("button", { class: "copy", onclick: e => copyToClipboard(directUrl, e.target) }, ["Copy"]),
      directUrl,
    ]),
  ]);

  const card4 = el("div", { class: "card" }, [
    el("h2", {}, ["Launch the Gantt now"]),
    el("p", { class: "desc" }, [
      "Test it without leaving this page. (You'll need a project record ID to filter.)"
    ]),
    el("div", { class: "fld" }, [
      el("label", {}, ["Project record ID to test with (optional)"]),
      el("input", { type: "text", id: "wiz-launch-rid", placeholder: "e.g. 42" }),
    ]),
    el("div", { class: "card-actions" }, [
      el("button", { class: "btn", onclick: () => { Wiz.step = 3; renderWizard(); }}, ["Back"]),
      el("button", { class: "btn primary", onclick: wizLaunch }, ["Launch Gantt"]),
    ]),
  ]);

  body.appendChild(card1);
  body.appendChild(card2);
  body.appendChild(card3);
  body.appendChild(card4);
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1200);
  });
}

function wizLaunch() {
  const rid = document.getElementById("wiz-launch-rid").value.trim();
  // build URL pointing at THIS page
  const m = Wiz.mapping; const dm = Wiz.depMapping || {};
  const params = new URLSearchParams(window.location.search);
  // strip setup
  params.delete("setup");
  params.set("taskdbid", Wiz.taskDbid);
  if (m.fidName) params.set("namefid", m.fidName);
  if (m.fidStart) params.set("startfid", m.fidStart);
  if (m.fidEnd) params.set("endfid", m.fidEnd);
  if (m.fidStartSave) params.set("startsavefid", m.fidStartSave);
  if (m.fidProject) params.set("projectfid", m.fidProject);
  if (m.fidStatus) params.set("statusfid", m.fidStatus);
  if (m.fidPercent) params.set("percentfid", m.fidPercent);
  if (m.fidAssigned) params.set("assignedfid", m.fidAssigned);
  if (m.fidGroup) params.set("groupfid", m.fidGroup);
  if (m.fidMilestone) params.set("milestonefid", m.fidMilestone);
  if (m.fidPriority) params.set("priorityfid", m.fidPriority);
  if (m.fidBaselineStart) params.set("baselinestartfid", m.fidBaselineStart);
  if (m.fidBaselineEnd) params.set("baselineendfid", m.fidBaselineEnd);
  if (m.fidParentTask) params.set("parentfid", m.fidParentTask);
  if (m.fidSortOrder) params.set("sortorderfid", m.fidSortOrder);
  if (m.fidWbs) params.set("wbsfid", m.fidWbs);
  if (m.fidDuration) params.set("durationfid", m.fidDuration);
  if (Wiz.depDbid) params.set("depdbid", Wiz.depDbid);
  if (dm.fidDepPred) params.set("deppredfid", dm.fidDepPred);
  if (dm.fidDepSucc) params.set("depsuccfid", dm.fidDepSucc);
  if (dm.fidDepType) params.set("deptypefid", dm.fidDepType);
  if (dm.fidDepLag) params.set("deplagfid", dm.fidDepLag);
  if (dm.fidDepProject) params.set("depprojectfid", dm.fidDepProject);
  if (rid) params.set("projectrid", rid);
  window.location.search = params.toString();
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot() {
  if (getBoolParam("setup")) {
    startWizard();
    return;
  }
  loadConfig();
  if (!State.cfg.taskDbid || !State.cfg.fidName || !State.cfg.fidStart || !State.cfg.fidEnd) {
    showError(new Error("Missing required config. Append &setup=true to run the setup wizard."));
    return;
  }
  loadPersistedSettings();
  // Initialize chart window so the first render after loadTasks doesn't blow up
  // if the table is empty or loadTasks errors.
  State.chartStart = addDays(new Date(), -30);
  State.chartEnd = addDays(new Date(), 90);
  renderShell();
  setStatus("Loading tasks...", "info");
  try {
    await loadTasks();
    setTimeout(scrollToToday, 100);
  } catch (e) {
    showError(e);
  }
}

// keyboard shortcuts
document.addEventListener("keydown", e => {
  if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
  if (e.ctrlKey && e.key === "z") { e.preventDefault(); undo(); return; }
  if (e.ctrlKey && e.key === "y") { e.preventDefault(); redo(); return; }
  if (e.ctrlKey && e.key === "s" && !State.cfg.autoSave) { e.preventDefault(); saveAllPending(); return; }
  if (e.key === "t" || e.key === "T") scrollToToday();
  if (e.key === "f" || e.key === "F") fitToTasks();
  if (e.key === "Escape") { closeQuickEdit(); dismissContextMenu(); }
  if (e.key === "F11") { e.preventDefault(); toggleFullscreen(); return; }
  if (e.key === "Insert" && !State.cfg.readOnly) { createTask(); return; }
  if (e.key === "1") setZoom("day");
  if (e.key === "2") setZoom("week");
  if (e.key === "3") setZoom("month");
  if (e.key === "4") setZoom("quarter");
  if (e.key === "5") setZoom("all");
  if (e.key === "v" || e.key === "V") validateSchedule();
  if (e.key === "ArrowLeft" && !e.ctrlKey) shiftWindow(-1);
  if (e.key === "ArrowRight" && !e.ctrlKey) shiftWindow(1);
});

boot();
</script>
