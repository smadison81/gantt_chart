<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quickbase Gantt</title>
<style>
:root{
  --bg:#f8fafc; --surface:#fff; --surface-2:#f1f5f9; --surface-3:#e2e8f0;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --text:#0f172a; --text-2:#475569; --text-3:#94a3b8;
  --accent:#3b82f6; --accent-dark:#2563eb; --accent-soft:#dbeafe;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444; --info:#6366f1;
  --bar:#6366f1; --bar-complete:#10b981; --bar-late:#ef4444;
  --bar-progress:#f59e0b; --bar-blocked:#dc2626; --bar-baseline:#cbd5e1;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg:0 10px 25px -5px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.05);
  --radius:8px; --radius-sm:6px; --row-h:38px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);background:var(--bg)}
button{font:inherit;cursor:pointer;border:0;background:transparent;color:inherit}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ========== TOOLBAR ========== */
.toolbar{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20;height:56px;flex-shrink:0;
}
.toolbar h1{margin:0;font-size:15px;font-weight:600;color:var(--text)}
.toolbar h1 .sub{color:var(--text-3);font-weight:400;margin-left:8px;font-size:13px}
.toolbar .spacer{flex:1}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  font-size:13px;font-weight:500;transition:all .12s;
}
.btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent-dark);border-color:var(--accent-dark)}
.btn.ghost{border-color:transparent;background:transparent}
.btn.ghost:hover{background:var(--surface-2)}
.btn.danger{color:var(--danger)}
.btn.danger:hover{background:#fef2f2;border-color:#fecaca}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn .ic{width:14px;height:14px;display:inline-block}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:var(--surface)}
.seg button{padding:6px 10px;font-size:12px;font-weight:500;color:var(--text-2);border-right:1px solid var(--border)}
.seg button:last-child{border-right:0}
.seg button.active{background:var(--accent);color:#fff}
.seg button:hover:not(.active){background:var(--surface-2)}

/* ========== STATUS BAR ========== */
.statusbar{
  display:flex;align-items:center;gap:12px;padding:6px 16px;
  background:var(--surface-2);border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text-2);height:30px;flex-shrink:0;
}
.statusbar .pill{padding:2px 8px;border-radius:999px;background:var(--surface);border:1px solid var(--border)}
.statusbar .pill.ok{color:var(--success);border-color:#a7f3d0;background:#ecfdf5}
.statusbar .pill.warn{color:var(--warning);border-color:#fde68a;background:#fffbeb}
.statusbar .pill.err{color:var(--danger);border-color:#fecaca;background:#fef2f2}
.statusbar .pill.info{color:var(--accent);border-color:#bfdbfe;background:#eff6ff}

/* ========== MAIN LAYOUT ==========
   Two-pane architecture matching the QB Gantt plugin and standard Gantt UX:
   - .main: 3-column grid (left | divider | right), fixed height, overflow:hidden
   - .left: flex column with fixed list-head + scrollable list-body
   - .right: flex column with fixed timeline-head + scrollable timeline-scroll
   - timeline-scroll has BOTH overflow-x:auto AND overflow-y:auto, so its
     horizontal scrollbar sits at the bottom of the visible viewport, NOT
     hidden way below the rows.
   - JS syncs list-body.scrollTop ↔ timeline-scroll.scrollTop so vertical
     scrolling stays aligned. Rows in both panels stack via natural flow,
     so they cannot desync horizontally either. */
.main{
  display:grid;
  grid-template-columns:var(--left-w,440px) 6px 1fr;
  height:calc(100vh - 130px);
  overflow:hidden;
  background:var(--surface);
}
.divider-cell{
  cursor:col-resize;background:var(--border);
  transition:background .15s;
  z-index:6;position:relative;
}
.divider-cell:hover,.divider-cell.dragging{background:var(--accent)}
.divider-cell::after{
  content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:2px;height:30px;background:var(--text-3);border-radius:2px;opacity:.4;
}
.divider-cell:hover::after{opacity:.8;background:#fff}

/* ========== LEFT (LIST) ========== */
.left{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);min-width:0}
.list-head,.list-row{
  display:grid;
  grid-template-columns:50px var(--col-name,1fr) var(--col-dates,100px) var(--col-status,90px);
  gap:8px;align-items:center;padding:0 12px;height:var(--row-h);
  border-bottom:1px solid var(--border);font-size:13px;
  min-width:0;background:var(--surface);
  box-sizing:border-box;flex-shrink:0;
}
.list-head{
  flex-shrink:0;
  font-weight:600;color:var(--text-2);background:var(--surface-2);
  z-index:5;font-size:11px;
  text-transform:uppercase;letter-spacing:.04em;
}
.list-head > div{position:relative;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-resize{
  position:absolute;top:0;right:-4px;width:8px;height:100%;
  cursor:col-resize;z-index:6;
}
.col-resize:hover{background:linear-gradient(to right,transparent 3px,var(--accent) 3px,var(--accent) 5px,transparent 5px)}
.list-body{
  flex:1;
  overflow-y:auto;overflow-x:hidden;
  border-right:1px solid var(--border);
}
/* Reserve scrollbar-height padding at end of list-body to match the height
   of the timeline-scroll's horizontal scrollbar. Keeps last row aligned. */
.list-body::after{content:"";display:block;height:14px;flex-shrink:0}
.list-row{cursor:pointer;transition:background .1s;min-width:0}
.list-row:hover{background:var(--surface-2)}
.list-row.selected{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.list-row > div{min-width:0}
.list-row .rid{color:var(--text-3);font-size:12px;font-variant-numeric:tabular-nums}
.list-row .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.list-row .dt{color:var(--text-3);font-size:11px;font-variant-numeric:tabular-nums;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row .st{font-size:11px;color:var(--text-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-row.group-header{background:var(--surface-2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-2);grid-template-columns:1fr;cursor:pointer}
.list-row.group-header .gh{display:flex;align-items:center;gap:6px}
.list-row.group-header .chev{transition:transform .15s}
.list-row.group-header.collapsed .chev{transform:rotate(-90deg)}

/* ========== RIGHT (TIMELINE) ========== */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--surface);min-width:0}
.timeline-head{
  flex-shrink:0;
  height:var(--row-h);background:var(--surface-2);
  border-bottom:1px solid var(--border);
  z-index:4;
  overflow:hidden;
  position:relative;
}
.timeline-head-inner{position:relative;height:100%;will-change:transform}
.timeline-scroll{
  flex:1;
  overflow:auto;
  position:relative;background:var(--surface);
}
.timeline-inner{position:relative}

.tick-major{position:absolute;top:0;height:var(--row-h);
  border-left:1px solid var(--border-strong);font-size:11px;font-weight:600;
  padding:6px 8px;color:var(--text-2);white-space:nowrap;background:var(--surface-2);
}
.tick-minor{position:absolute;top:18px;height:18px;
  border-left:1px solid var(--border);font-size:10px;
  padding:2px 4px;color:var(--text-3);white-space:nowrap;
}
.row-grid{position:absolute;top:0;bottom:0;width:1px;background:var(--border)}
.row-grid.weekend{background:var(--surface-2);width:auto;left:0;border:0;opacity:.5}
.today-line{
  position:absolute;top:0;bottom:0;width:2px;background:var(--danger);
  z-index:3;pointer-events:none;box-shadow:0 0 4px rgba(239,68,68,.4);
}
.today-line::before{
  content:"TODAY";position:absolute;top:4px;left:4px;font-size:10px;
  font-weight:700;color:var(--danger);background:#fff;padding:1px 4px;
  border-radius:3px;letter-spacing:.05em;
}

.tl-row{position:relative;height:var(--row-h);border-bottom:1px solid var(--border)}
.tl-row.group-header{background:var(--surface-2)}
.tl-row.selected{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.tl-row:hover{background:rgba(59,130,246,.06)}
.tl-row:hover .bar:not(.dragging){filter:brightness(1.08)}

.bar{
  position:absolute;height:22px;top:8px;border-radius:5px;
  background:var(--bar);color:#fff;font-size:11px;font-weight:500;
  line-height:22px;padding:0 8px;overflow:hidden;white-space:nowrap;
  text-overflow:ellipsis;cursor:grab;user-select:none;
  box-shadow:var(--shadow-sm);transition:filter .1s,box-shadow .1s;
  display:flex;align-items:center;
}
.bar:hover{box-shadow:var(--shadow)}
.bar.dragging{cursor:grabbing;opacity:.85;z-index:5;box-shadow:var(--shadow-lg)}
.bar.not-started{background:#94a3b8}
.bar.complete{background:var(--bar-complete)}
.bar.in-progress{background:var(--bar-progress)}
.bar.late{background:var(--bar-late)}
.bar.blocked{background:var(--bar-blocked)}
.bar.critical{box-shadow:0 0 0 2px var(--danger),var(--shadow-sm)}
.bar.milestone{
  width:24px !important;height:24px;top:7px;
  transform:rotate(45deg);border-radius:3px;padding:0;justify-content:center;
}
.bar.milestone .lbl{display:none}
.bar .lbl{flex:1;overflow:hidden;text-overflow:ellipsis}
.bar .pct-fill{
  position:absolute;top:0;left:0;bottom:0;
  background:rgba(0,0,0,.22);border-radius:5px 0 0 5px;pointer-events:none;
}
.bar .handle{
  position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;
  background:rgba(255,255,255,0);transition:background .1s;
}
.bar:hover .handle{background:rgba(255,255,255,.3)}
.bar .handle.left{left:0;border-radius:5px 0 0 5px}
.bar .handle.right{right:0;border-radius:0 5px 5px 0}

.baseline-bar{
  position:absolute;height:6px;top:30px;border-radius:3px;
  background:var(--bar-baseline);opacity:.7;pointer-events:none;
}

.dep-svg{position:absolute;top:0;left:0;pointer-events:none;z-index:2}
.dep-line{stroke:var(--text-3);stroke-width:1.5;fill:none}
.dep-line.violation{stroke:var(--danger);stroke-width:2;stroke-dasharray:4,3}

/* ========== DRAG TOOLTIP ========== */
.drag-tooltip{
  position:fixed;z-index:1000;pointer-events:none;
  background:#0f172a;color:#fff;padding:8px 12px;border-radius:6px;
  font-size:12px;line-height:1.4;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  white-space:nowrap;
}
.drag-tooltip .name{
  font-weight:700;font-size:11px;text-transform:uppercase;
  letter-spacing:.04em;color:#94a3b8;margin-bottom:3px;
  max-width:280px;overflow:hidden;text-overflow:ellipsis;
}
.drag-tooltip .dates{font-variant-numeric:tabular-nums;font-size:13px}
.drag-tooltip .arrow{color:#64748b;margin:0 6px}
.drag-tooltip .meta{font-size:11px;color:#94a3b8;margin-top:4px}

/* ========== LEGEND ========== */
.legend{
  display:flex;gap:14px;align-items:center;font-size:11px;color:var(--text-2);
  flex-wrap:wrap;margin-left:auto;
}
.legend .item{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.legend .swatch{width:14px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.legend .swatch.milestone{
  width:10px;height:10px;transform:rotate(45deg);border-radius:1px;
}

/* ========== EMPTY/ERROR STATES ========== */
.empty,.err{
  padding:32px;text-align:center;color:var(--text-2);
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty .ico,.err .ico{font-size:32px;opacity:.5}
.err{color:var(--danger)}
.err pre{
  background:#fef2f2;border:1px solid #fecaca;padding:12px;
  border-radius:var(--radius-sm);font-size:12px;text-align:left;
  white-space:pre-wrap;max-width:600px;margin:0;
}

/* ========== SIDE PANEL (QUICK EDIT) ========== */
.side-panel{
  position:fixed;top:0;right:0;bottom:0;width:380px;
  background:var(--surface);border-left:1px solid var(--border);
  box-shadow:var(--shadow-lg);z-index:30;
  transform:translateX(100%);transition:transform .2s;
  display:flex;flex-direction:column;
}
.side-panel.open{transform:translateX(0)}
.side-panel .ph{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.side-panel .ph h3{margin:0;font-size:15px}
.side-panel .pb{flex:1;overflow-y:auto;padding:16px}
.side-panel .pf{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:4px}
.fld input,.fld select,.fld textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface);
}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  outline:0;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);
}
.fld .help{font-size:11px;color:var(--text-3);margin-top:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dep-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.dep-section h4{font-size:13px;font-weight:600;color:var(--text-2);margin:0 0 10px}
.dep-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--surface-2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:12px}
.dep-item .dep-type{font-weight:600;color:var(--accent);min-width:24px}
.dep-item .dep-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dep-item .dep-lag{color:var(--text-3);font-size:11px}
.dep-item .dep-del{background:none;border:none;color:var(--text-3);cursor:pointer;padding:2px 4px;font-size:14px;line-height:1}
.dep-item .dep-del:hover{color:var(--danger)}
.dep-add{display:grid;grid-template-columns:1fr auto auto auto;gap:6px;align-items:end;margin-top:8px}
.dep-add select,.dep-add input{padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-size:12px}
.dep-add input[type=number]{width:50px}
.dep-add .btn{padding:6px 10px;font-size:12px}

/* ========== SETUP WIZARD ========== */
.wizard{
  position:fixed;inset:0;background:linear-gradient(135deg,#f8fafc 0%,#eff6ff 100%);
  overflow:auto;z-index:50;
}
.wizard .container{max-width:780px;margin:40px auto;padding:0 20px}
.wizard h1{font-size:28px;margin:0 0 8px;color:var(--text)}
.wizard .lead{color:var(--text-2);font-size:15px;margin:0 0 28px}
.steps{display:flex;gap:8px;margin-bottom:28px}
.step{
  flex:1;padding:10px 14px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);
  font-size:12px;font-weight:600;color:var(--text-3);
  display:flex;align-items:center;gap:8px;
}
.step.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.step.done{background:var(--success);color:#fff;border-color:var(--success)}
.step .num{
  width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.2);
  display:inline-flex;align-items:center;justify-content:center;font-size:11px;
}
.step:not(.active):not(.done) .num{background:var(--surface-2)}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);
  margin-bottom:16px;
}
.card h2{font-size:18px;margin:0 0 6px}
.card .desc{color:var(--text-2);margin:0 0 18px;font-size:14px}
.card-actions{display:flex;justify-content:space-between;gap:8px;margin-top:8px}

.field-map{
  display:grid;grid-template-columns:200px 1fr;gap:10px 14px;
  align-items:center;
}
.field-map label{font-size:13px;font-weight:500;color:var(--text)}
.field-map label .req{color:var(--danger)}
.field-map label .hint{display:block;font-size:11px;color:var(--text-3);font-weight:400;margin-top:2px}
.field-map select{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface)}
.field-map select.match{border-color:var(--success);background:#ecfdf5}
.field-map select.unmapped{border-color:var(--warning);background:#fffbeb}
.field-map .group-title{
  grid-column:1 / -1;font-size:11px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-3);font-weight:700;padding-top:8px;border-top:1px dashed var(--border);
  margin-top:8px;
}
.field-map .group-title:first-child{border-top:0;padding-top:0;margin-top:0}

.code-block{
  background:#0f172a;color:#e2e8f0;padding:16px;border-radius:var(--radius-sm);
  font:13px ui-monospace,Menlo,Monaco,Consolas,monospace;
  white-space:pre-wrap;word-break:break-all;line-height:1.5;
  position:relative;max-height:280px;overflow:auto;
}
.code-block .copy{
  position:absolute;top:8px;right:8px;padding:4px 8px;font-size:11px;
  background:rgba(255,255,255,.1);color:#e2e8f0;border-radius:4px;border:1px solid rgba(255,255,255,.2);
}
.code-block .copy:hover{background:rgba(255,255,255,.2)}
.code-block .copy.copied{background:var(--success);border-color:var(--success);color:#fff}

.note{
  padding:10px 14px;background:#eff6ff;border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);font-size:13px;color:var(--text);margin:8px 0 16px;
}
.note.warn{background:#fffbeb;border-color:var(--warning)}
.note.err{background:#fef2f2;border-color:var(--danger)}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px}
.summary-grid .k{color:var(--text-3);font-size:12px}
.summary-grid .v{font-weight:600;font-family:ui-monospace,Menlo,monospace;font-size:12px}

/* ========== LOADING ========== */
.loading{
  display:flex;align-items:center;justify-content:center;
  height:200px;color:var(--text-3);gap:10px;
}
.spinner{
  width:18px;height:18px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ========== TOAST ========== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);
  font-size:13px;box-shadow:var(--shadow-lg);z-index:100;
  animation:toast-in .2s ease-out;
}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
@keyframes toast-in{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ========== FILTERS ========== */
.filterbar{
  display:flex;gap:8px;align-items:center;padding:8px 16px;
  background:var(--surface);border-bottom:1px solid var(--border);
  font-size:13px;height:44px;flex-shrink:0;
}
.filterbar input,.filterbar select{
  padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface);font-size:12px;
}
.filterbar input:focus,.filterbar select:focus{
  outline:0;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);
}
.filterbar .search{width:200px}
.chip{
  display:inline-flex;align-items:center;gap:4px;padding:3px 8px;
  background:var(--accent-soft);color:var(--accent-dark);border-radius:999px;
  font-size:11px;font-weight:600;
}
.chip .x{cursor:pointer;opacity:.7}
.chip .x:hover{opacity:1}

/* ========== VALIDATION PANEL ========== */
.validation-list{padding:0;margin:0;list-style:none}
.validation-list li{
  padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;gap:10px;align-items:start;cursor:pointer;font-size:13px;
}
.validation-list li:hover{background:var(--surface-2)}
.validation-list li .sev{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;
}
.validation-list li.error .sev{background:var(--danger)}
.validation-list li.warning .sev{background:var(--warning)}
.validation-list li.info .sev{background:var(--accent)}
.validation-list li .meta{font-size:11px;color:var(--text-3);margin-top:2px}

/* ========== KEYBOARD HINT ========== */
.kbd{
  display:inline-block;padding:1px 6px;background:var(--surface-2);
  border:1px solid var(--border);border-radius:3px;font-size:11px;
  font-family:ui-monospace,Menlo,monospace;color:var(--text-2);
}

/* ========== READ-ONLY INDICATOR ========== */
.readonly-pill{
  padding:3px 10px;border-radius:999px;background:#fef2f2;
  color:var(--danger);font-size:11px;font-weight:600;border:1px solid #fecaca;
}

/* ========== PENDING BADGE ========== */
.badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:999px;
  background:var(--danger);color:#fff;font-size:10px;font-weight:700;
  margin-left:4px;
}

/* ========== SUMMARY BAR (Hierarchy) ========== */
.bar.summary{
  height:8px;top:15px;border-radius:0;cursor:default;
  background:var(--text-2);
}
.bar.summary::before,.bar.summary::after{
  content:"";position:absolute;bottom:-4px;width:8px;height:8px;
  border-left:3px solid var(--text-2);border-bottom:3px solid var(--text-2);
}
.bar.summary::before{left:0;transform:skewY(-30deg)}
.bar.summary::after{right:0;transform:skewY(30deg)}
.indent{display:inline-flex;align-items:center;gap:4px}
.chevron-btn{
  cursor:pointer;background:none;border:0;padding:0 2px;font-size:12px;
  color:var(--text-3);transition:transform .15s;
}
.chevron-btn.collapsed{transform:rotate(-90deg)}

/* ========== CONNECTOR (Dep Draw) ========== */
.connector{
  position:absolute;right:-6px;top:50%;transform:translateY(-50%);
  width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);
  background:var(--surface);cursor:crosshair;opacity:0;transition:opacity .15s;
  z-index:4;
}
.bar:hover .connector{opacity:1}
.dep-draw-line{stroke:var(--accent);stroke-width:2;stroke-dasharray:6,3;fill:none}

/* ========== INLINE EDIT ========== */
.inline-input{
  width:100%;padding:2px 4px;border:1px solid var(--accent);
  border-radius:3px;font-size:12px;background:var(--surface);
  box-shadow:0 0 0 2px var(--accent-soft);
}

/* ========== DRAG HANDLE (Reorder) ========== */
.drag-grip{
  cursor:grab;color:var(--text-3);font-size:14px;user-select:none;
  display:flex;align-items:center;justify-content:center;
}
.drag-grip:hover{color:var(--text-2)}
.list-row.drag-over{box-shadow:inset 0 -2px 0 var(--accent)}

/* ========== PROGRESS HANDLE ========== */
.pct-handle{
  position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;
  background:rgba(255,255,255,.5);border-left:2px solid rgba(255,255,255,.8);
  opacity:0;transition:opacity .15s;z-index:3;
}
.bar:hover .pct-handle{opacity:1}

/* ========== HOLIDAY SHADING ========== */
.row-grid.holiday{background:#fef2f2;width:auto;left:0;border:0;opacity:.4}

/* ========== CONTEXT MENU ========== */
.ctx-menu{
  position:fixed;z-index:40;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-lg);min-width:180px;padding:4px 0;
}
.ctx-item{
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  font-size:13px;cursor:pointer;color:var(--text);
  border:none;background:none;width:100%;text-align:left;
}
.ctx-item:hover{background:var(--surface-2)}
.ctx-item.danger{color:var(--danger)}
.ctx-item.danger:hover{background:#fef2f2}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ========== TOUCH-ACTION (global) ========== */
.bar,.bar .handle,.pct-handle,.divider-cell{touch-action:none}

/* ========== MOBILE RESPONSIVE ========== */
@media (max-width:768px){
  /* Layout overrides */
  .main.mobile-hidden{display:none}
  .statusbar{display:none}
  .mobile-cards{
    flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding-bottom:80px;display:flex;flex-direction:column;
  }

  /* Toolbar mobile */
  .toolbar{flex-wrap:wrap;height:auto;min-height:48px;gap:6px;padding:8px 12px}
  .toolbar h1 .sub{display:none}
  .toolbar .spacer{display:none}
  .toolbar .mobile-hide{display:none}

  /* Filter bar collapse */
  .filterbar{max-height:0;overflow:hidden;padding:0 12px;transition:max-height .25s ease,padding .25s ease}
  .filterbar.expanded{max-height:400px;padding:8px 12px}
  .filterbar .search{width:100%}
  .filterbar .legend{display:none}

  /* Side panel full-screen */
  .side-panel{width:100vw;border-left:none}
  .side-panel .pf{flex-wrap:wrap}
  .side-panel .pf .btn{min-height:44px;flex:1}

  /* Section headers */
  .mobile-section-header{
    position:sticky;top:0;z-index:5;
    display:flex;align-items:center;gap:8px;
    padding:10px 16px;background:var(--surface-2);
    border-bottom:1px solid var(--border);
    font-size:13px;font-weight:600;color:var(--text);
  }
  .mobile-section-header .dot{
    width:10px;height:10px;border-radius:50%;flex-shrink:0;
  }
  .mobile-section-header .count{
    margin-left:auto;font-weight:400;color:var(--text-3);font-size:12px;
  }

  /* Card styles */
  .mobile-card{
    padding:14px 16px;border-bottom:1px solid var(--border);
    display:flex;flex-direction:column;gap:8px;
    background:var(--surface);cursor:pointer;
    transition:background .1s;
  }
  .mobile-card:active{background:var(--surface-2)}
  .card-top{
    display:flex;align-items:center;gap:8px;
  }
  .card-top .card-name{
    flex:1;min-width:0;font-weight:600;font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-top .status-badge{
    padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;
    white-space:nowrap;flex-shrink:0;
  }
  .card-meta{
    display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-2);
    flex-wrap:wrap;
  }
  .card-meta .meta-item{display:flex;align-items:center;gap:4px}
  .card-progress{
    height:4px;border-radius:2px;background:var(--surface-3);overflow:hidden;
  }
  .card-progress-fill{height:100%;border-radius:2px;transition:width .2s}

  /* Touch targets */
  .btn{min-height:44px}
  .seg button{min-height:40px;padding:8px 12px}
  .ctx-item{min-height:44px}

  /* Overflow panel (slide-in) */
  .overflow-panel{
    position:fixed;top:0;right:0;bottom:0;width:260px;z-index:35;
    background:var(--surface);box-shadow:var(--shadow-lg);
    transform:translateX(100%);transition:transform .2s ease;
    overflow-y:auto;padding:12px 0;
  }
  .overflow-panel.open{transform:translateX(0)}
  .overflow-panel .overflow-item{
    display:flex;align-items:center;gap:10px;padding:10px 16px;
    font-size:14px;cursor:pointer;color:var(--text);
    border:none;background:none;width:100%;text-align:left;
  }
  .overflow-panel .overflow-item:active{background:var(--surface-2)}
  .overflow-panel .overflow-sep{height:1px;background:var(--border);margin:4px 0}
  .overflow-panel .overflow-label{
    padding:6px 16px;font-size:11px;font-weight:600;color:var(--text-3);
    text-transform:uppercase;letter-spacing:.5px;
  }
  .overflow-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:34;
    display:none;
  }
  .overflow-backdrop.open{display:block}

  /* FAB */
  .fab{
    position:fixed;bottom:20px;right:20px;width:56px;height:56px;
    border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;box-shadow:var(--shadow-lg);z-index:25;
    border:none;cursor:pointer;transition:background .15s;
  }
  .fab:active{background:var(--accent-dark)}
}

<body>
<div id="app"></div>

<script>
"use strict";

/* ============================================================
   CONFIG MANAGEMENT
   ============================================================ */
const VERSION = "1.0.0";
const DEFAULTS = {
  pixelsPerDay: 28,
  rowHeight: 38,
  defaultWindowDays: 180,
  zoom: "week",
};
const ZOOM_LEVELS = {
  day:     { ppd: 40, majorUnit: "week",    minorUnit: "day"     },
  week:    { ppd: 22, majorUnit: "month",   minorUnit: "week"    },
  month:   { ppd: 8,  majorUnit: "quarter", minorUnit: "month"   },
  quarter: { ppd: 3,  majorUnit: "year",    minorUnit: "quarter" },
  // "all" computes ppd dynamically so the entire chart fits the viewport width
  all:     { ppd: "auto", majorUnit: "year", minorUnit: "quarter" },
};

const State = {
  cfg: {},
  realm: window.location.hostname,
  token: "",
  schema: null,        // schema fields list (setup mode + caching)
  records: [],         // raw record list
  tasks: [],           // mapped task objects
  filtered: [],        // after filters
  visible: [],         // after grouping/collapse
  groups: {},          // collapsed groups {key: true}
  dependencies: [],    // dep records
  selectedRid: null,
  zoom: "week",
  ppd: 22,
  chartStart: null,
  chartEnd: null,
  columnOrder: ["id", "name", "dates", "status"],
  filters: {
    search: "",
    status: "",
    range: "all",
    showMilestones: true,
    showLate: false,
  },
  groupBy: "none",
  showBaselines: true,
  showDeps: true,
  cascadeOnMove: false,
  showLabels: true,
  undoStack: [],
  redoStack: [],
  pendingChanges: [],
  collapsedTasks: {},
  mobileView: "auto",   // "auto" | "cards" | "gantt"
};

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}
function getBoolParam(name, fallback=false) {
  const v = getParam(name);
  if (!v) return fallback;
  return v === "1" || v.toLowerCase() === "true";
}
function getNumParam(name, fallback=0) {
  const v = getParam(name);
  if (!v) return fallback;
  const n = Number(v);
  return isNaN(n) ? fallback : n;
}

function isMobile() { return window.innerWidth <= 768; }
function detectMobileView() {
  if (State.mobileView === "cards") return true;
  if (State.mobileView === "gantt") return false;
  return isMobile();
}

function loadConfig() {
  const cfg = {
    // Required
    taskDbid:        getParam("taskdbid"),
    fidName:         getNumParam("namefid"),
    fidStart:        getNumParam("startfid"),
    fidEnd:          getNumParam("endfid"),

    // Strongly recommended
    fidProject:      getNumParam("projectfid"),    // FID on task table that holds parent project record id
    projectRid:      getParam("projectrid"),       // current project record id

    // Optional save target for dragged start (when display start is calculated)
    fidStartSave:    getNumParam("startsavefid"),  // if 0 we save back to fidStart

    // Optional fields
    fidStatus:       getNumParam("statusfid"),
    fidPercent:      getNumParam("percentfid"),
    fidGroup:        getNumParam("groupfid"),
    fidAssigned:     getNumParam("assignedfid"),
    fidMilestone:    getNumParam("milestonefid"),
    fidPriority:     getNumParam("priorityfid"),

    // Hierarchy & ordering
    fidParentTask:   getNumParam("parentfid"),
    fidSortOrder:    getNumParam("sortorderfid"),
    fidWbs:          getNumParam("wbsfid"),
    fidDuration:     getNumParam("durationfid"),

    // Baselines
    fidBaselineStart: getNumParam("baselinestartfid"),
    fidBaselineEnd:   getNumParam("baselineendfid"),

    // Dependencies
    depDbid:         getParam("depdbid"),
    fidDepPred:      getNumParam("deppredfid"),
    fidDepSucc:      getNumParam("depsuccfid"),
    fidDepLag:       getNumParam("deplagfid"),
    fidDepProject:   getNumParam("depprojectfid"),
    fidDepType:      getNumParam("deptypefid"),

    // App token (rare; only if temp token requires it)
    appToken:        getParam("apptoken"),

    // Behavior
    allowDrag:       getBoolParam("drag", true),
    allowResize:     getBoolParam("resize", true),
    title:           getParam("title") || "Project Gantt",
    pageId:          getParam("pageid") || getParam("pid") || "",
    initialZoom:     getParam("zoom") || "week",
    pixelsPerDay:    getNumParam("ppd", 0),

    // Mode flags
    readOnly:        getBoolParam("readonly", false),
    autoSave:        getBoolParam("autosave", true),
    skipWeekends:    getBoolParam("skipweekends", true),
    holidays:        getParam("holidays"),
  };
  State.cfg = cfg;
  State.zoom = ZOOM_LEVELS[cfg.initialZoom] ? cfg.initialZoom : "week";
  State.ppd = cfg.pixelsPerDay || ZOOM_LEVELS[State.zoom].ppd;
}

/* ============================================================
   QUICKBASE API CLIENT
   ============================================================ */
async function getTempToken(dbid) {
  const headers = {
    "QB-Realm-Hostname": State.realm,
    "Content-Type": "application/json",
  };
  if (State.cfg.appToken) headers["QB-App-Token"] = State.cfg.appToken;
  const res = await fetch(`https://api.quickbase.com/v1/auth/temporary/${dbid}`, {
    method: "GET", headers, credentials: "include",
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Auth failed (${res.status}): ${txt.slice(0,200)}`);
  }
  const j = await res.json();
  return j.temporaryAuthorization;
}

async function qbFetch(path, opts = {}, dbid) {
  if (!State.token) State.token = await getTempToken(dbid || State.cfg.taskDbid);
  const headers = {
    "QB-Realm-Hostname": State.realm,
    "Authorization": `QB-TEMP-TOKEN ${State.token}`,
    "Content-Type": "application/json",
    ...(opts.headers || {}),
  };
  const res = await fetch(`https://api.quickbase.com/v1${path}`, { ...opts, headers });
  const txt = await res.text();
  let json = {};
  try { json = txt ? JSON.parse(txt) : {}; } catch { throw new Error("Invalid JSON: " + txt.slice(0,200)); }
  if (!res.ok) {
    if (res.status === 401) {
      // refresh token and retry once
      State.token = await getTempToken(dbid || State.cfg.taskDbid);
      headers.Authorization = `QB-TEMP-TOKEN ${State.token}`;
      const res2 = await fetch(`https://api.quickbase.com/v1${path}`, { ...opts, headers });
      const txt2 = await res2.text();
      const j2 = txt2 ? JSON.parse(txt2) : {};
      if (!res2.ok) throw new Error(j2.description || j2.message || `${res2.status}`);
      return j2;
    }
    throw new Error(json.description || json.message || `${res.status}: ${txt.slice(0,200)}`);
  }
  return json;
}

async function fetchSchema(dbid) {
  return await qbFetch(`/fields?tableId=${dbid}`, { method: "GET" }, dbid);
}

async function queryRecords(dbid, body) {
  return await qbFetch("/records/query", {
    method: "POST", body: JSON.stringify({ from: dbid, ...body }),
  }, dbid);
}

async function updateRecords(dbid, data, fieldsToReturn = []) {
  return await qbFetch("/records", {
    method: "POST",
    body: JSON.stringify({ to: dbid, data, fieldsToReturn }),
  }, dbid);
}

/* ============================================================
   DATE UTILITIES
   ============================================================ */
function dateOnly(v) { return v ? String(v).substring(0, 10) : ""; }
function parseDate(v) {
  if (!v) return null;
  const s = dateOnly(v);
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) {
    const [y,m,d] = s.split("-").map(Number);
    return new Date(y, m-1, d);
  }
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [m,d,y] = s.split("/").map(Number);
    return new Date(y, m-1, d);
  }
  const dt = new Date(v);
  return isNaN(dt.getTime()) ? null : dt;
}
function fmtISO(d) {
  if (!d) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtUS(d) {
  if (!d) return "";
  return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${d.getFullYear()}`;
}
function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function diffDays(a, b) {
  return Math.round((b.getTime() - a.getTime()) / 86400000);
}
function startOfWeek(d) {
  const x = new Date(d);
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0,0,0,0);
  return x;
}
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function startOfQuarter(d) { return new Date(d.getFullYear(), Math.floor(d.getMonth()/3)*3, 1); }
function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }
function isWeekend(d) { const w = d.getDay(); return w === 0 || w === 6; }

/* ============================================================
   WORKING-DAY CALENDAR
   ============================================================ */
function parseHolidays(str) {
  if (!str) return [];
  return str.split(",").map(s => s.trim()).filter(Boolean);
}

function isHoliday(d) {
  const holidays = parseHolidays(State.cfg.holidays);
  if (!holidays.length) return false;
  const mmdd = `${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const full = fmtISO(d);
  return holidays.some(h => h === mmdd || h === full);
}

function isWorkingDay(d) {
  if (State.cfg.skipWeekends && isWeekend(d)) return false;
  if (isHoliday(d)) return false;
  return true;
}

function addWorkingDays(d, n) {
  if (!State.cfg.skipWeekends && !State.cfg.holidays) return addDays(d, n);
  const x = new Date(d);
  const dir = n >= 0 ? 1 : -1;
  let remaining = Math.abs(n);
  while (remaining > 0) {
    x.setDate(x.getDate() + dir);
    if (isWorkingDay(x)) remaining--;
  }
  return x;
}

function diffWorkingDays(a, b) {
  if (!State.cfg.skipWeekends && !State.cfg.holidays) return diffDays(a, b);
  let count = 0;
  const start = a < b ? new Date(a) : new Date(b);
  const end = a < b ? b : a;
  const cursor = new Date(start);
  while (cursor < end) {
    cursor.setDate(cursor.getDate() + 1);
    if (isWorkingDay(cursor)) count++;
  }
  return a < b ? count : -count;
}

/* ============================================================
   FIELD VALUE HELPERS
   ============================================================ */
function fv(row, fid) {
  if (!fid || !row[fid]) return "";
  const v = row[fid].value;
  return v === undefined || v === null ? "" : v;
}
function firstFv(row, fids) {
  for (const f of fids) {
    const v = fv(row, f);
    if (v !== "" && v !== null && v !== undefined) return v;
  }
  return "";
}

/* ============================================================
   LOAD TASKS
   ============================================================ */
async function loadTasks() {
  const { cfg } = State;
  setStatus("Loading tasks...", "info");

  const select = [
    3, // record id
    cfg.fidName, cfg.fidStart, cfg.fidEnd,
    cfg.fidStartSave, cfg.fidStatus, cfg.fidPercent,
    cfg.fidGroup, cfg.fidAssigned, cfg.fidMilestone, cfg.fidPriority,
    cfg.fidBaselineStart, cfg.fidBaselineEnd,
    cfg.fidProject,
    cfg.fidParentTask, cfg.fidSortOrder, cfg.fidWbs, cfg.fidDuration,
  ].filter(x => x && x > 0);

  const where = [];
  if (cfg.projectRid && cfg.fidProject) {
    where.push(`{${cfg.fidProject}.EX.${cfg.projectRid}}`);
  }
  // ensure tasks have a start date
  if (cfg.fidStart) where.push(`{${cfg.fidStart}.XEX.''}`);

  const body = {
    select,
    where: where.join("AND") || undefined,
    sortBy: [
      { fieldId: cfg.fidStart, order: "ASC" },
      { fieldId: 3, order: "ASC" },
    ],
    options: { top: 1000, skip: 0 },
  };

  const result = await queryRecords(cfg.taskDbid, body);
  State.records = result.data || [];
  State.tasks = State.records.map(mapTask).filter(t => t.start && t.end);
  State.filtered = State.tasks;

  // Load deps if configured
  if (cfg.depDbid && cfg.fidDepPred && cfg.fidDepSucc) {
    try { await loadDeps(); }
    catch (e) { console.warn("Deps load failed:", e); }
  }

  computeChartWindow();
  applyFilters();
  setStatus(`Loaded ${State.tasks.length} task${State.tasks.length===1?"":"s"}`, "ok");
}

function mapTask(row) {
  const { cfg } = State;
  // Match the reference code's pattern: prefer the display start, fall back
  // to the editable save target. This lets the bar render correctly even
  // when FID 9 is empty for newly-saved records before the formula recalcs.
  const displayStart = fv(row, cfg.fidStart);
  const editableStart = cfg.fidStartSave ? fv(row, cfg.fidStartSave) : "";
  const startVal = displayStart || editableStart;
  const endVal = fv(row, cfg.fidEnd);
  const start = parseDate(startVal);
  let end = parseDate(endVal);
  if (start && !end) end = start;

  const name = String(firstFv(row, [cfg.fidName, 3]) || "Untitled");
  const status = String(fv(row, cfg.fidStatus) || "");
  const percent = Number(fv(row, cfg.fidPercent) || 0);
  const groupVal = String(fv(row, cfg.fidGroup) || "");
  const assigned = String(fv(row, cfg.fidAssigned) || "");
  const milestoneFlag = fv(row, cfg.fidMilestone);
  const priority = String(fv(row, cfg.fidPriority) || "");

  const isMilestone = milestoneFlag === true ||
    (start && end && fmtISO(start) === fmtISO(end) && !cfg.fidEnd);

  const baselineStart = parseDate(fv(row, cfg.fidBaselineStart));
  const baselineEnd = parseDate(fv(row, cfg.fidBaselineEnd));

  return {
    rid: fv(row, 3),
    name, status, percent: isNaN(percent) ? 0 : Math.max(0, Math.min(100, percent)),
    group: groupVal, assigned, priority,
    start, end, isMilestone,
    baselineStart, baselineEnd,
    parentRid: Number(fv(row, cfg.fidParentTask) || 0),
    sortOrder: Number(fv(row, cfg.fidSortOrder) || 0),
    wbs: String(fv(row, cfg.fidWbs) || ""),
    duration: Number(fv(row, cfg.fidDuration) || 0),
    depth: 0,
    isParent: false,
    raw: row,
  };
}

async function loadDeps() {
  const { cfg } = State;
  const select = [3, cfg.fidDepPred, cfg.fidDepSucc, cfg.fidDepLag, cfg.fidDepProject, cfg.fidDepType].filter(x => x && x > 0);
  const where = (cfg.fidDepProject && cfg.projectRid)
    ? `{${cfg.fidDepProject}.EX.${cfg.projectRid}}` : undefined;
  const result = await queryRecords(cfg.depDbid, { select, where, options: { top: 1000 } });
  State.dependencies = (result.data || []).map(r => ({
    rid: fv(r, 3),
    pred: Number(fv(r, cfg.fidDepPred) || 0),
    succ: Number(fv(r, cfg.fidDepSucc) || 0),
    lag: Number(fv(r, cfg.fidDepLag) || 0),
    type: String(fv(r, cfg.fidDepType) || "FS").toUpperCase(),
  })).filter(d => d.pred && d.succ);
}

/* ============================================================
   FILTERS / GROUPING
   ============================================================ */
function applyFilters() {
  const f = State.filters;
  const today = new Date(); today.setHours(0,0,0,0);
  let list = State.tasks.slice();

  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(t => t.name.toLowerCase().includes(q));
  }
  if (f.status) {
    list = list.filter(t => t.status === f.status);
  }
  if (!f.showMilestones) {
    list = list.filter(t => !t.isMilestone);
  }
  if (f.showLate) {
    list = list.filter(t => t.end < today && t.percent < 100);
  }
  if (f.range && f.range !== "all") {
    const days = { "30": 30, "90": 90, "180": 180, "365": 365 }[f.range];
    if (days) {
      const cutoff = addDays(today, days);
      list = list.filter(t => t.start <= cutoff && t.end >= addDays(today, -30));
    }
  }
  State.filtered = list;
  computeVisible();
  render();
}

function computeVisible() {
  let list = State.filtered.slice();

  // Hierarchy: build parent-child tree when parentfid is configured
  if (State.cfg.fidParentTask) {
    list = buildHierarchy(list);
  } else if (State.cfg.fidSortOrder) {
    list.sort((a, b) => a.sortOrder - b.sortOrder);
  }

  if (State.groupBy === "none") {
    State.visible = list.map(t => ({ type: "task", task: t }));
    return;
  }
  // group
  const buckets = {};
  list.forEach(t => {
    const k = State.groupBy === "status" ? (t.status || "(no status)")
            : State.groupBy === "group" ? (t.group || "(no group)")
            : State.groupBy === "assigned" ? (t.assigned || "(unassigned)")
            : "(all)";
    if (!buckets[k]) buckets[k] = [];
    buckets[k].push(t);
  });
  const out = [];
  Object.keys(buckets).sort().forEach(k => {
    out.push({ type: "group", key: k, count: buckets[k].length });
    if (!State.groups[k]) buckets[k].forEach(t => out.push({ type: "task", task: t, group: k }));
  });
  State.visible = out;
}

/* ============================================================
   TASK HIERARCHY
   ============================================================ */
function buildHierarchy(tasks) {
  const byRid = {};
  tasks.forEach(t => { byRid[t.rid] = t; t.children = []; t.isParent = false; });

  // Build tree
  const roots = [];
  tasks.forEach(t => {
    const parent = t.parentRid ? byRid[t.parentRid] : null;
    if (parent) {
      parent.children.push(t);
      parent.isParent = true;
    } else {
      roots.push(t);
    }
  });

  // Sort children by sortOrder within each level
  function sortChildren(node) {
    if (node.children.length) {
      node.children.sort((a, b) => a.sortOrder - b.sortOrder);
      node.children.forEach(sortChildren);
    }
  }
  roots.sort((a, b) => a.sortOrder - b.sortOrder);
  roots.forEach(sortChildren);

  // Roll up summary dates and percent for parent tasks
  function rollUp(node) {
    if (!node.children.length) return;
    node.children.forEach(rollUp);
    let minStart = node.children[0].start;
    let maxEnd = node.children[0].end;
    let totalPct = 0;
    node.children.forEach(c => {
      if (c.start && (!minStart || c.start < minStart)) minStart = c.start;
      if (c.end && (!maxEnd || c.end > maxEnd)) maxEnd = c.end;
      totalPct += c.percent;
    });
    if (minStart) node.start = minStart;
    if (maxEnd) node.end = maxEnd;
    node.percent = Math.round(totalPct / node.children.length);
  }
  roots.forEach(rollUp);

  // DFS flatten respecting collapsed state
  const result = [];
  function dfs(node, depth) {
    node.depth = depth;
    result.push(node);
    if (node.isParent && State.collapsedTasks[node.rid]) return;
    node.children.forEach(c => dfs(c, depth + 1));
  }
  roots.forEach(r => dfs(r, 0));
  return result;
}

function toggleTaskCollapse(rid) {
  State.collapsedTasks[rid] = !State.collapsedTasks[rid];
  computeVisible();
  render();
}

function expandAll() {
  State.collapsedTasks = {};
  computeVisible();
  render();
}

function collapseAll() {
  State.tasks.filter(t => t.isParent).forEach(t => { State.collapsedTasks[t.rid] = true; });
  computeVisible();
  render();
}

/* ============================================================
   CHART WINDOW
   ============================================================ */
function computeChartWindow() {
  if (!State.tasks.length) {
    State.chartStart = addDays(new Date(), -7);
    State.chartEnd = addDays(new Date(), DEFAULTS.defaultWindowDays);
    return;
  }
  let minStart = State.tasks[0].start;
  let maxEnd = State.tasks[0].end;
  for (const t of State.tasks) {
    if (t.start < minStart) minStart = t.start;
    if (t.end > maxEnd) maxEnd = t.end;
    if (t.baselineStart && t.baselineStart < minStart) minStart = t.baselineStart;
    if (t.baselineEnd && t.baselineEnd > maxEnd) maxEnd = t.baselineEnd;
  }
  State.chartStart = addDays(minStart, -14);
  State.chartEnd = addDays(maxEnd, 21);
}

function totalDays() { return Math.max(1, diffDays(State.chartStart, State.chartEnd) + 1); }
function chartWidth() { return totalDays() * State.ppd; }
function dateToX(d) { return diffDays(State.chartStart, d) * State.ppd; }
function xToDate(x) { return addDays(State.chartStart, Math.round(x / State.ppd)); }

function render() {
  const showCards = detectMobileView();
  renderToolbar(showCards);
  renderStatusBar();
  renderFilterBar(showCards);
  const main = document.getElementById("main");
  if (showCards) {
    if (main) main.classList.add("mobile-hidden");
    renderMobileCards();
    const fab = document.getElementById("mobile-fab");
    if (fab) fab.style.display = "";
  } else {
    if (main) main.classList.remove("mobile-hidden");
    removeMobileCards();
    renderList();
    renderTimeline();
  }
  persistSettings();
}

function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
    else if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c == null) return;
    e.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return e;
}

const COL_DEFS = {
  id:     { label: "ID",     resize: false },
  name:   { label: "Name",   resize: true, resizeCol: "name"   },
  dates:  { label: "Dates",  resize: true, resizeCol: "dates"  },
  status: { label: "Status", resize: false },
};

function buildColumnCSS(order) {
  const widths = order.map(c => {
    if (c === "id") return "50px";
    if (c === "name") return "var(--col-name,1fr)";
    if (c === "dates") return "var(--col-dates,100px)";
    if (c === "status") return "var(--col-status,90px)";
    return "1fr";
  });
  return widths.join(" ");
}

function renderListHead() {
  const head = document.getElementById("list-head");
  if (!head) return;
  head.innerHTML = "";
  head.style.gridTemplateColumns = buildColumnCSS(State.columnOrder);

  State.columnOrder.forEach(colId => {
    const def = COL_DEFS[colId];
    const hdr = el("div", { draggable: "true", "data-colid": colId, style: { cursor: "grab" }}, [def.label]);
    if (def.resize) {
      hdr.appendChild(el("div", { class: "col-resize", "data-col": def.resizeCol, title: "Drag to resize" }));
    }
    // Drag reorder events
    hdr.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", colId);
      e.dataTransfer.effectAllowed = "move";
      hdr.style.opacity = "0.5";
    });
    hdr.addEventListener("dragend", () => { hdr.style.opacity = ""; });
    hdr.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      hdr.style.borderLeft = "2px solid var(--accent)";
    });
    hdr.addEventListener("dragleave", () => { hdr.style.borderLeft = ""; });
    hdr.addEventListener("drop", e => {
      e.preventDefault();
      hdr.style.borderLeft = "";
      const from = e.dataTransfer.getData("text/plain");
      if (from === colId) return;
      const arr = [...State.columnOrder];
      const fi = arr.indexOf(from);
      const ti = arr.indexOf(colId);
      if (fi < 0 || ti < 0) return;
      arr.splice(fi, 1);
      arr.splice(ti, 0, from);
      State.columnOrder = arr;
      renderListHead();
      renderList();
      persistSettings();
    });
    head.appendChild(hdr);
  });
}

    fab.textContent = "+";
    fab.addEventListener("click", () => createTask());
    document.getElementById("app").appendChild(fab);
  }
  // Debounced resize listener for mobile/desktop threshold crossing
  let resizeTimer;
  let wasMobile = isMobile();
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const nowMobile = isMobile();
      if (nowMobile !== wasMobile) { wasMobile = nowMobile; render(); }
    }, 150);
  });
  // Restore saved layout from URL params if provided
  const root = document.documentElement;
  const savedLeft = getNumParam("leftw", 0);
  const savedColName = getNumParam("colname", 0);
  const savedColDates = getNumParam("coldates", 0);
  if (savedLeft) root.style.setProperty("--left-w", savedLeft + "px");
  if (savedColName) root.style.setProperty("--col-name", savedColName + "px");
  if (savedColDates) root.style.setProperty("--col-dates", savedColDates + "px");
  renderListHead();
  attachLayoutResizers();
}

function attachLayoutResizers() {
  // Panel divider drag (between left list and timeline)
  const divider = document.getElementById("panel-divider");
  if (divider) {
    divider.addEventListener("pointerdown", e => {
      e.preventDefault();
      divider.classList.add("dragging");
      divider.setPointerCapture(e.pointerId);
      const startX = e.clientX;
      const startW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--left-w")) || 440;

      const onMove = ev => {
        const dx = ev.clientX - startX;
        const w = Math.max(220, Math.min(900, startW + dx));
        document.documentElement.style.setProperty("--left-w", w + "px");
      };
      const onUp = () => {
        divider.classList.remove("dragging");
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
        // Re-render so the timeline width recalculates correctly
        render();
      };
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  }

  // Column resize handles (Name and Dates)
  document.querySelectorAll(".col-resize").forEach(handle => {
    handle.addEventListener("pointerdown", e => {
      e.preventDefault();
      e.stopPropagation();
      const col = handle.dataset.col;
      const cssVar = col === "name" ? "--col-name" : "--col-dates";
      const startX = e.clientX;
      const current = getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim();
      // For name col, default is 1fr (no fixed width). Compute current pixel width from the rendered cell.
      const headCells = document.querySelectorAll(".list-head > div");
      const cellIdx = col === "name" ? 1 : 2;
      const startW = headCells[cellIdx] ? headCells[cellIdx].getBoundingClientRect().width : 200;

      handle.setPointerCapture(e.pointerId);
      const onMove = ev => {
        const dx = ev.clientX - startX;
        const w = Math.max(60, Math.min(600, startW + dx));
        document.documentElement.style.setProperty(cssVar, w + "px");
      };
      const onUp = () => {
        document.removeEventListener("pointermove", onMove);
        document.removeEventListener("pointerup", onUp);
      };
      document.addEventListener("pointermove", onMove);
      document.addEventListener("pointerup", onUp);
    });
  });
}

    tb.appendChild(el("div", { class: "spacer" }));

      class: "btn primary", onclick: saveAllPending,
    }, ["Save"]);

    if (!pc) saveBtn.disabled = true;
    tb.appendChild(saveBtn);

      class: "btn danger", onclick: discardAllPending,
    }, ["Discard"]);

    tb.appendChild(discardBtn);

function renderOverflowMenu() {
  const panel = document.getElementById("overflow-panel");
  if (!panel) return;
  panel.innerHTML = "";

  function item(label, action) {
    const btn = el("button", { class: "overflow-item", onclick: () => { toggleOverflowMenu(); action(); }}, [label]);
    panel.appendChild(btn);
  }
  function sep() { panel.appendChild(el("div", { class: "overflow-sep" })); }
  function lbl(text) { panel.appendChild(el("div", { class: "overflow-label" }, [text])); }

  lbl("Actions");
  item("Refresh", () => loadTasks().catch(showError));
  if (State.undoStack.length) item("Undo (" + State.undoStack.length + ")", undo);
  if (State.redoStack.length) item("Redo (" + State.redoStack.length + ")", redo);
  if (!State.cfg.autoSave && State.pendingChanges.length) {
    item("Save (" + State.pendingChanges.length + ")", saveAllPending);
    item("Discard changes", discardAllPending);
  }
  sep();

  lbl("Navigation");
  item("Today", scrollToToday);
  item("Fit to tasks", fitToTasks);
  item("\u25C0 Previous", () => shiftWindow(-1));
  item("\u25B6 Next", () => shiftWindow(1));
  sep();

  lbl("View");
  item("Validate schedule", validateSchedule);

  item("Export Excel", exportXLS);

  ["day","week","month","quarter","all"].forEach(k => {
    seg.appendChild(el("button", {
      class: State.zoom === k ? "active" : "",

    }, [k === "all" ? "All" : k.charAt(0).toUpperCase()+k.slice(1)]));

    class: "btn", style: { margin: "4px 16px", width: "calc(100% - 32px)" },

function toggleOverflowMenu() {
  const panel = document.getElementById("overflow-panel");
  const backdrop = document.getElementById("overflow-backdrop");
  if (!panel || !backdrop) return;
  const opening = !panel.classList.contains("open");
  panel.classList.toggle("open");
  backdrop.classList.toggle("open");
  if (opening) {
    backdrop.onclick = toggleOverflowMenu;
  }
}

function renderFilterBar(showCards = false) {
  const fb = document.getElementById("filterbar");
  if (!fb) return;
  fb.innerHTML = "";
  // On mobile, start collapsed (CSS hides via max-height:0; toggle adds .expanded)
  if (isMobile() && !fb.classList.contains("expanded")) fb.classList.remove("expanded");

  const search = el("input", {
    type: "text", class: "search", placeholder: "Search tasks...",
    value: State.filters.search,
    oninput: e => { State.filters.search = e.target.value; applyFilters(); }
  });
  fb.appendChild(search);

  // Status filter (built from data)
  const statuses = [...new Set(State.tasks.map(t => t.status).filter(Boolean))];
  if (statuses.length) {
    const sel = el("select", {
      onchange: e => { State.filters.status = e.target.value; applyFilters(); }
    });
    sel.appendChild(el("option", { value: "" }, ["All statuses"]));
    statuses.forEach(s => {
      const o = el("option", { value: s }, [s]);
      if (State.filters.status === s) o.selected = true;
      sel.appendChild(o);
    });
    fb.appendChild(sel);
  }

  const range = el("select", {
    onchange: e => { State.filters.range = e.target.value; applyFilters(); }
  });
  [["all","All time"],["30","Next 30 days"],["90","Next 90 days"],["180","Next 6 months"],["365","Next year"]].forEach(([v,l]) => {
    const o = el("option", { value: v }, [l]);
    if (State.filters.range === v) o.selected = true;
    range.appendChild(o);

/* ============================================================
   INLINE CELL EDITING
   ============================================================ */
function startInlineEdit(cell, task, field) {
  const { cfg } = State;
  let input;

  if (field === "name") {
    input = el("input", { type: "text", class: "inline-input", value: task.name });
    const finish = (save) => {
      if (save && input.value !== task.name) {
        const oldName = task.name;
        task.name = input.value;
        saveFieldValue(task, cfg.fidName, input.value, "Name");
      }
      render();
    };
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); finish(true); }
      if (e.key === "Escape") { e.preventDefault(); finish(false); }
    });
    input.addEventListener("blur", () => finish(true));
  } else if (field === "status") {
    const statuses = [...new Set(State.tasks.map(x => x.status).filter(Boolean))];
    input = el("select", { class: "inline-input" });
    input.appendChild(el("option", { value: "" }, [""]));
    statuses.forEach(s => {
      const o = el("option", { value: s }, [s]);
      if (s === task.status) o.selected = true;
      input.appendChild(o);
    });
    const finish = (save) => {
      if (save && input.value !== task.status) {
        task.status = input.value;
        saveFieldValue(task, cfg.fidStatus, input.value, "Status");
      }
      render();
    };
    input.addEventListener("change", () => finish(true));
    input.addEventListener("keydown", e => {
      if (e.key === "Escape") { e.preventDefault(); finish(false); }
    });
    input.addEventListener("blur", () => finish(true));
  }

  if (input) {
    cell.textContent = "";
    cell.appendChild(input);
    input.focus();
    if (input.select) input.select();
  }
}

/* ============================================================
   DRAG TO REORDER
   ============================================================ */
let _dragRid = null;
function attachRowDrag(row, task, idx) {
  row.addEventListener("dragstart", e => {
    _dragRid = task.rid;
    e.dataTransfer.effectAllowed = "move";
    row.style.opacity = "0.5";
  });
  row.addEventListener("dragend", () => {
    _dragRid = null;
    row.style.opacity = "";
    document.querySelectorAll(".list-row.drag-over").forEach(r => r.classList.remove("drag-over"));
  });
  row.addEventListener("dragover", e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    row.classList.add("drag-over");
  });
  row.addEventListener("dragleave", () => {
    row.classList.remove("drag-over");
  });
  row.addEventListener("drop", e => {
    e.preventDefault();
    row.classList.remove("drag-over");
    if (!_dragRid || _dragRid === task.rid) return;
    dropRow(_dragRid, task.rid);
  });
}

async function dropRow(draggedRid, targetRid) {
  const { cfg } = State;
  const list = State.visible.filter(v => v.type === "task").map(v => v.task);
  const dragIdx = list.findIndex(t => t.rid === draggedRid);
  const targetIdx = list.findIndex(t => t.rid === targetRid);
  if (dragIdx < 0 || targetIdx < 0) return;

  // Move dragged item to target position
  const [moved] = list.splice(dragIdx, 1);
  list.splice(targetIdx, 0, moved);

  // Assign new sort orders with gaps of 10
  const updates = [];
  list.forEach((t, i) => {
    const newOrder = (i + 1) * 10;
    if (t.sortOrder !== newOrder) {
      t.sortOrder = newOrder;
      updates.push({ [3]: { value: t.rid }, [cfg.fidSortOrder]: { value: newOrder } });
    }
  });

  computeVisible();
  render();

  if (updates.length && cfg.autoSave) {
    try {
      await updateRecords(cfg.taskDbid, updates, [3]);
      toast("Reordered", "success");
    } catch (err) {
      toast("Reorder save failed: " + err.message, "error");
    }
  } else if (updates.length) {
    updates.forEach(u => {
      const rid = u[3].value;
      queueChange(rid, cfg.fidSortOrder, 0, u[cfg.fidSortOrder].value);
    });
    toast("Reorder queued", "info");
  }
}

function renderTimeline() {
  const headInner = document.getElementById("timeline-head-inner");
  const inner = document.getElementById("timeline-inner");
  const scroll = document.getElementById("timeline-scroll");
  const listBody = document.getElementById("list-body");
  if (!headInner || !inner || !scroll) return;

  const w = chartWidth();
  headInner.innerHTML = "";
  inner.innerHTML = "";
  inner.style.width = w + "px";
  headInner.style.width = w + "px";

  renderTicks(headInner, w);
  renderTodayLine(inner);
  renderRows(inner, w);
  renderDependencies(inner, w);

  // Horizontal: header tracks timeline-scroll via CSS transform.
  // Vertical: bidirectional sync between list-body and timeline-scroll using
  // a flag to break re-entry. The flag flips back via requestAnimationFrame
  // so we don't lose user-driven scroll events.
  let syncing = false;
  scroll.onscroll = () => {
    headInner.style.transform = `translateX(-${scroll.scrollLeft}px)`;
    State._scrollLeft = scroll.scrollLeft;
    if (!syncing && listBody) {
      syncing = true;
      listBody.scrollTop = scroll.scrollTop;
      State._scrollTop = scroll.scrollTop;
      requestAnimationFrame(() => { syncing = false; });
    }
  };
  if (listBody) {
    listBody.onscroll = () => {
      if (!syncing) {
        syncing = true;
        scroll.scrollTop = listBody.scrollTop;
        State._scrollTop = listBody.scrollTop;
        requestAnimationFrame(() => { syncing = false; });
      }
    };
  }

  // Restore scroll positions
  if (State._scrollLeft != null) {
    scroll.scrollLeft = State._scrollLeft;
    headInner.style.transform = `translateX(-${State._scrollLeft}px)`;
  }
  if (State._scrollTop != null) {
    scroll.scrollTop = State._scrollTop;
    if (listBody) listBody.scrollTop = State._scrollTop;
  }
}

   MOBILE CARDS VIEW
   ============================================================ */
function isCompleteStatus(s) {
  if (!s) return false;
  const lc = s.toLowerCase();
  return lc === "complete" || lc === "completed" || lc === "done" || lc === "closed";
}
function isInProgressStatus(s) {
  if (!s) return false;
  const lc = s.toLowerCase();
  if (isCompleteStatus(s)) return false;
  if (lc === "not started" || lc === "pending" || lc === "planning" || lc === "new" || lc === "") return false;
  return true;
}

function renderMobileCards() {
  const container = document.getElementById("mobile-cards");
  if (!container) return;
  container.innerHTML = "";
  container.style.display = "flex";

  const today = new Date(); today.setHours(0,0,0,0);
  const weekOut = addDays(today, 7);

  const buckets = {
    overdue:   { label: "Overdue",       color: "var(--danger)",  dot: "#ef4444", items: [] },
    dueWeek:   { label: "Due This Week", color: "var(--warning)", dot: "#f59e0b", items: [] },
    inProgress:{ label: "In Progress",   color: "var(--accent)",  dot: "#3b82f6", items: [] },
    upcoming:  { label: "Upcoming",      color: "var(--info)",    dot: "#6366f1", items: [] },
    complete:  { label: "Complete",      color: "var(--success)", dot: "#10b981", items: [] },
  };

  for (const t of State.filtered) {
    if (!t.start || !t.end) { buckets.upcoming.items.push(t); continue; }
    const done = t.percent >= 100 || isCompleteStatus(t.status);
    if (done) { buckets.complete.items.push(t); continue; }
    const endDate = new Date(t.end); endDate.setHours(0,0,0,0);
    if (endDate < today) { buckets.overdue.items.push(t); continue; }
    if (endDate <= weekOut) { buckets.dueWeek.items.push(t); continue; }
    if (isInProgressStatus(t.status)) { buckets.inProgress.items.push(t); continue; }
    buckets.upcoming.items.push(t);
  }

  // Sort each bucket
  buckets.overdue.items.sort((a,b) => a.end - b.end);
  buckets.dueWeek.items.sort((a,b) => a.end - b.end);
  buckets.inProgress.items.sort((a,b) => a.end - b.end);
  buckets.upcoming.items.sort((a,b) => a.start - b.start);
  buckets.complete.items.sort((a,b) => b.end - a.end);

  for (const [key, bucket] of Object.entries(buckets)) {
    if (!bucket.items.length) continue;
    // Section header
    const header = el("div", { class: "mobile-section-header" }, [
      el("span", { class: "dot", style: { background: bucket.dot }}),
      bucket.label,
      el("span", { class: "count" }, [String(bucket.items.length)]),
    ]);
    container.appendChild(header);

    for (const t of bucket.items) {
      container.appendChild(buildMobileCard(t, key));
    }
  }

  if (!State.filtered.length) {
    container.appendChild(el("div", {
      style: { padding: "40px 16px", textAlign: "center", color: "var(--text-3)" }
    }, ["No tasks to display"]));
  }
}

function buildMobileCard(t, bucketKey) {
  const card = el("div", { class: "mobile-card", onclick: () => openQuickEdit(t.rid) });

  // Top row: name + status badge
  const statusColor = isCompleteStatus(t.status) ? "var(--success)"
    : bucketKey === "overdue" ? "var(--danger)"
    : bucketKey === "dueWeek" ? "var(--warning)"
    : isInProgressStatus(t.status) ? "var(--accent)" : "var(--text-3)";
  const badgeBg = isCompleteStatus(t.status) ? "#ecfdf5"
    : bucketKey === "overdue" ? "#fef2f2"
    : bucketKey === "dueWeek" ? "#fffbeb"
    : isInProgressStatus(t.status) ? "#eff6ff" : "var(--surface-2)";

  const top = el("div", { class: "card-top" }, [
    el("span", { class: "card-name" }, [t.name]),
  ]);
  if (t.status) {
    top.appendChild(el("span", {
      class: "status-badge",
      style: { color: statusColor, background: badgeBg },
    }, [t.status]));
  }
  card.appendChild(top);

  // Meta row: dates, assignee, milestone
  const meta = el("div", { class: "card-meta" });
  if (t.start && t.end) {
    meta.appendChild(el("span", { class: "meta-item" }, [
      fmtUS(t.start) + " \u2192 " + fmtUS(t.end),
    ]));
  }
  if (t.assigned) {
    meta.appendChild(el("span", { class: "meta-item" }, [t.assigned]));
  }
  if (t.isMilestone) {
    meta.appendChild(el("span", { class: "meta-item", style: { color: "var(--info)" }}, ["\u25C6 Milestone"]));
  }
  card.appendChild(meta);

  // Progress bar
  if (t.percent > 0 || t.start) {
    const barColor = bucketKey === "overdue" ? "var(--danger)"
      : bucketKey === "complete" ? "var(--success)" : "var(--accent)";
    const bar = el("div", { class: "card-progress" }, [
      el("div", { class: "card-progress-fill", style: { width: t.percent + "%", background: barColor }}),
    ]);
    card.appendChild(bar);
  }

  return card;
}
